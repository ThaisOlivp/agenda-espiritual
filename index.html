            <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text-dim)',letterSpacing:'0.1em',whiteSpace:'nowrap'}}>DE</span>
            <input type="date" className="search-input" style={{flex:1}} value={filterFrom} onChange={e => setFilterFrom(e.target.value)} />
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
            <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text-dim)',letterSpacing:'0.1em',whiteSpace:'nowrap'}}>ATÉ</span>
            <input type="date" className="search-input" style={{flex:1}} value={filterTo} onChange={e => setFilterTo(e.target.value)} />
          </div>
          {(filterFrom||filterTo) && <button className="btn btn-ghost btn-sm" onClick={() => { setFilterFrom(''); setFilterTo(''); }}>Limpar</button>}
        </div>

        {view === 'lista' ? (
          sorted.length === 0
            ? <div className="empty-state"><div className="empty-icon">🌙</div><p>Nenhum agendamento encontrado</p></div>
            : <>
                {getDateGroups(paged, 'date').map(grp => grp.items.length === 0 ? null : (
                  <React.Fragment key={grp.key}>
                    <div style={{padding:'10px 16px 4px',fontFamily:'DM Mono,monospace',fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:grp.color,background:'rgba(0,0,0,0.2)',borderBottom:'1px solid rgba(128,128,128,0.15)'}}>
                      {grp.label} · {grp.items.length} agendamento{grp.items.length !== 1 ? 's' : ''}
                    </div>
                    <table>
                      <thead><tr>
                        <th {...aptThProps('clientName')}>Cliente</th>
                        <th {...aptThProps('service')}>Serviço</th>
                        <th {...aptThProps('date')}>Data</th>
                        <th>Horário</th>
                        <th>Valor / Pgto</th>
                        <th>Observação</th>
                        <th {...aptThProps('status')}>Status</th>
                        <th>Por</th>
                        <th></th>
                      </tr></thead>
                      <tbody>
                        {grp.items.map(a => {
                          const cl = clients.find(c => c.id === a.clientId);
                          const overdueApt = isOverdue(a);
                          const total = parseMoney(a.value);
                          const pago = parseMoney(a.valorPago);
                          const isParcial = a.pagamento === 'parcial' && total > 0;
                          const payLabel = a.pagamento === 'depois'
                            ? { icon:'📅', label:'Paga depois', color:'#e08888' }
                            : a.pagamento === 'parcial'
                              ? { icon:'⚖', label:'Parcial', color:'var(--gold)' }
                              : null;
                          const debtQuitada = a.pagamento === 'depois' && (debts||[]).some(d =>
                            d.clientId === a.clientId && d.status === 'Quitada' &&
                            d.description && d.description.includes(formatDate(a.date))
                          );
                          const showPayLabel = payLabel && !debtQuitada;
                          return (
                            <tr key={a.id}>
                              <td>
                                {cl
                                  ? <span style={{cursor:'pointer',borderBottom:'1px dotted var(--purple-light)'}} onClick={() => setShowDetail(cl)}>{clientName(cl)}</span>
                                  : (a.clientName || '—')
                                }
                              </td>
                              <td><span className={badgeClass(a.service)}>{a.service}</span></td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:14}}>{formatDate(a.date)}</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:14}}>{a.time || '—'}</td>
                              <td>
                                {a.value ? (
                                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                    <span style={{fontFamily:'DM Mono,monospace',fontSize:14,color:a.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>
                                      {formatValue(a.value, a.currency)}
                                    </span>
                                    {isParcial && (
                                      <div style={{display:'flex',flexDirection:'column',gap:2}}>
                                        <span style={{fontSize:11,color:'var(--text-dim)',fontFamily:'DM Mono,monospace'}}>
                                          pago <span style={{color:'#7ec8a0'}}>{formatValue(String(pago),a.currency)}</span>
                                        </span>
                                        <span style={{fontSize:11,color:'#e0a870',fontFamily:'DM Mono,monospace'}}>
                                          restam {formatValue(String(Math.max(0,total-pago)),a.currency)}
                                        </span>
                                      </div>
                                    )}
                                    {showPayLabel && !isParcial && (
                                      <span style={{fontSize:11,color:payLabel.color,fontFamily:'DM Mono,monospace'}}>{payLabel.icon} {payLabel.label}</span>
                                    )}
                                    {debtQuitada && (
                                      <span style={{fontSize:11,color:'#7ec8a0',fontFamily:'DM Mono,monospace'}}>✓ quitado</span>
                                    )}
                                  </div>
                                ) : <span style={{color:'var(--text-dim)'}}>—</span>}
                              </td>
                              <td><div className="obs-cell">{a.notes || '—'}</div></td>
                              <td>
                                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                                  <select value={a.status} onChange={e => quickStatus(a.id, e.target.value)}
                                    style={{background:'transparent',border:'none',cursor:'pointer',fontSize:13,fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',
                                      color:a.status==='Concluído'?'#7ec49a':a.status==='Cancelado'?'#e08888':'var(--gold)'}}>
                                    {STATUS.map(s => <option key={s} style={{background:'#15101f'}}>{s}</option>)}
                                  </select>
                                  {overdueApt && <span className="badge badge-atrasado">Atrasado</span>}
                                </div>
                              </td>
                              <td><span className="badge badge-user">{a.createdBy || '—'}</span></td>
                              <td>
                                <div style={{display:'flex',gap:6}}>
                                  <button className="btn btn-ghost btn-sm" onClick={() => openEdit(a)}>Editar</button>
                                  <button className="btn btn-ghost btn-sm" title="Duplicar" onClick={() => duplicateApt(a)}>⎘</button>
                                  <button className="btn btn-danger" onClick={() => deleteApt(a.id)}>✕</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </React.Fragment>
                ))}
                <Pagination page={page} totalPages={totalPages} setPage={setPage} total={sorted.length} />
              </>
        ) : (
          <div style={{padding:'16px 24px'}}>
            {agendaDates.length === 0
              ? <div className="empty-state"><div className="empty-icon">🌙</div><p>Nenhum agendamento</p></div>
              : agendaDates.map(date => {
                  const isToday = date === today();
                  return (
                    <div key={date} className="agenda-day">
                      <div className={`agenda-day-header${isToday ? ' today-header' : ''}`}>
                        {formatDate(date)}{isToday ? ' — Hoje' : ''}
                      </div>
                      {sorted.filter(a => a.date === date).sort((a,b) => (a.time||'') > (b.time||'') ? 1 : -1).map(a => {
                        const cl = clients.find(c => c.id === a.clientId);
                        const overdueApt = isOverdue(a);
                        return (
                          <div key={a.id} className={`agenda-item${isToday?' today-item':''}`} onClick={() => openEdit(a)}>
                            <div className="agenda-time">{a.time || '--:--'}</div>
                            <div className="agenda-info" style={{flex:1}}>
                              <h4>{cl ? clientName(cl) : a.clientName || '—'}</h4>
                              <p>{a.service} {a.value && `· ${formatValue(a.value, a.currency)}`}</p>
                              {a.notes && <div className="agenda-obs">{a.notes}</div>}
                            </div>
                            <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end',marginLeft:'auto'}}>
                              <span className={badgeClass(a.status)}>{a.status}</span>
                              {overdueApt && <span className="badge badge-atrasado">Atrasado</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })
            }
          </div>
        )}
      </div>

      {savedConfirm && (
        <div style={{position:'fixed',bottom:24,right:24,zIndex:200,background:'var(--surface)',border:'1px solid var(--purple-light)',padding:'20px 24px',minWidth:300,maxWidth:380,boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontFamily:'Cinzel,serif',fontSize:14,color:'var(--purple-light)',letterSpacing:'0.1em'}}>✦ Agendamento Salvo</span>
            <button onClick={() => setSavedConfirmQueue(q => q.slice(1))} style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:16}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'6px 12px',fontSize:14}}>
            <span style={{color:'var(--text-dim)'}}>Cliente</span><span>{savedConfirm.clientName}</span>
            <span style={{color:'var(--text-dim)'}}>Serviço</span><span>{savedConfirm.service}</span>
            <span style={{color:'var(--text-dim)'}}>Data</span>
            <span style={{fontFamily:'DM Mono,monospace',color:'var(--gold)'}}>
              {formatDate(savedConfirm.date)}{savedConfirm.time ? (' às ' + savedConfirm.time) : ''}
            </span>
            {savedConfirm.value && (
              <><span style={{color:'var(--text-dim)'}}>Valor</span>
              <span style={{fontFamily:'DM Mono,monospace',color:savedConfirm.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>{formatValue(savedConfirm.value, savedConfirm.currency)}</span></>
            )}
            {savedConfirm.hasDebt && (
              <><span style={{color:'var(--text-dim)'}}>Dívida</span>
              <span style={{color:'#e08888'}}>◉ Criada automaticamente</span></>
            )}
          </div>
        </div>
      )}

      {showDetail && (
        <Modal title="Ficha do Cliente" onClose={() => setShowDetail(null)} wide>
          <div className="detail-grid">
            <div><div className="detail-item-label">Nome</div><div className="detail-item-value">{showDetail.name}</div></div>
            <div><div className="detail-item-label">Telefone</div><div className="detail-item-value">{showDetail.phone || '—'}</div></div>
            <div><div className="detail-item-label">País</div><div className="detail-item-value">{showDetail.country || '—'}</div></div>
            <div><div className="detail-item-label">Nascimento</div><div className="detail-item-value">{formatDate(showDetail.birthdate)}</div></div>
            <div><div className="detail-item-label">Signo</div><div className="detail-item-value">{getZodiac(showDetail.birthdate) || '—'}</div></div>
            <div style={{gridColumn:'1/-1'}}><div className="detail-item-label">Observações</div><div className="detail-item-value" style={{fontStyle:'italic',color:'var(--text-muted)'}}>{showDetail.notes || '—'}</div></div>
          </div>
          <div className="divider-line"/>
          <ClientHistoryTabs
            clientApts={sortByDate(appointments.filter(a => a.clientId === showDetail.id), 'date', 'desc')}
            clientWrks={[]}
            clientDebts={sortByDate((debts||[]).filter(d => d.clientId === showDetail.id && d.status !== 'Quitada'), 'dueDate', 'desc')}
          />
        </Modal>
      )}

      {showModal && (
        <Modal title={editing ? 'Editar Atendimento' : 'Novo Agendamento'} onClose={() => setShowModal(false)} wide
          footer={<><button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Salvar Agendamento</button></>}>
          <div className="form-group">
            <label className="form-label">Cliente</label>
            <ClientSearchSelect
              clients={clients}
              value={form.clientId}
              onChange={id => setForm({...form, clientId:id, clientName:''})}
              clientName={clientName}
            />
            {!form.clientId && (
              <input className="form-input" style={{marginTop:8}} value={form.clientName} onChange={e => setForm({...form, clientName:e.target.value})} placeholder="Ou digitar nome manualmente..." />
            )}
            {form.clientId && (() => {
              const cl = clients.find(c => c.id === form.clientId);
              if (!cl) return null;
              const aptCount = appointments.filter(a => a.clientId === cl.id).length;
              const openDebt = (debts||[]).filter(d => d.clientId === cl.id && d.status !== 'Quitada');
              const debtTotal = openDebt.reduce((s, d) => s + parseMoney(getRemaining(d.total, d.paid)), 0);
              return (
                <div className="client-summary">
                  <div className="client-summary-item">Atendimentos: <span>{aptCount}</span></div>
                  {cl.phone && <div className="client-summary-item">Fone: <span>{cl.phone}</span></div>}
                  {cl.country && <div className="client-summary-item">País: <span>{cl.country}</span></div>}
                  {openDebt.length > 0 && <div className="client-summary-item client-summary-debt">⚠ Dívida em aberto: <span>{formatMoney(debtTotal)}</span></div>}
                  {cl.notes && <div className="client-summary-item" style={{width:'100%',color:'var(--text-muted)',fontStyle:'italic'}}>{cl.notes}</div>}
                </div>
              );
            })()}
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Serviço *</label>
              <select className="form-input" value={form.service} onChange={e => setForm({...form, service:e.target.value})}>
                {SERVICES.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-input" value={form.status} onChange={e => setForm({...form, status:e.target.value})}>
                {STATUS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Data *</label>
              <input type="date" className="form-input" value={form.date} onChange={e => setForm({...form, date:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Horário</label>
              <input type="time" className="form-input" value={form.time} onChange={e => setForm({...form, time:e.target.value})} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Valor</label>
            <CurrencyField value={form.value} currency={form.currency} onValueChange={v => setForm({...form, value:v})} onCurrencyChange={c => setForm({...form, currency:c})} />
          </div>
          {!editing && (
            <div className="form-group">
              <label className="form-label">Pagamento</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[{v:'na_hora',l:'💰 Paga na hora'},{v:'parcial',l:'⚖ Parcial'},{v:'depois',l:'📅 Paga depois'}].map(opt => (
                  <button key={opt.v} type="button" onClick={() => setForm({...form, pagamento:opt.v, valorPago:'', vencimento:''})}
                    style={{padding:'8px 16px',border:'1px solid',borderColor:form.pagamento===opt.v?'var(--purple-light)':'var(--border)',background:form.pagamento===opt.v?'rgba(155,111,212,0.15)':'transparent',color:form.pagamento===opt.v?'var(--purple-light)':'var(--text-dim)',cursor:'pointer',fontSize:14,fontFamily:'Cormorant Garamond,serif',transition:'all 0.2s'}}>
                    {opt.l}
                  </button>
                ))}
              </div>
              {form.pagamento === 'parcial' && (
                <div className="form-row" style={{marginTop:10}}>
                  <div className="form-group">
                    <label className="form-label">Valor pago na hora</label>
                    <input className="form-input" type="number" min="0" step="0.01" value={form.valorPago} onChange={e => setForm({...form, valorPago:e.target.value})} placeholder={`0,00 ${form.currency==='EUR'?'€':'R$'}`} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Vencimento do restante</label>
                    <input type="date" className="form-input" value={form.vencimento} onChange={e => setForm({...form, vencimento:e.target.value})} />
                  </div>
                </div>
              )}
              {form.pagamento === 'depois' && (
                <div className="form-group" style={{marginTop:10}}>
                  <label className="form-label">Data de vencimento</label>
                  <input type="date" className="form-input" value={form.vencimento} onChange={e => setForm({...form, vencimento:e.target.value})} />
                </div>
              )}
              {form.pagamento !== 'na_hora' && parseMoney(form.value) > 0 && (
                <div style={{marginTop:8,padding:'8px 12px',background:'rgba(224,136,136,0.1)',border:'1px solid rgba(224,136,136,0.3)',fontSize:13,color:'#e08888',fontFamily:'DM Mono,monospace'}}>
                  ◉ Dívida de {formatValue(form.pagamento==='parcial' ? String(parseMoney(form.value) - parseMoney(form.valorPago)) : form.value, form.currency)} será criada automaticamente
                </div>
              )}
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Observações / Situação</label>
            <textarea className="form-input" value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} placeholder="Detalhes do caso, pedidos especiais, informações importantes..." />
          </div>
        </Modal>
      )}
    </div>
  );
}

function Works({ clients, works, setWorks, debts, setDebts, notify, currentUser }) {
  const [view, setView] = useState('lista');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterType, setFilterType] = useState('');
  const [showDetail, setShowDetail] = useState(null);
  const [savedConfirmQueue, setSavedConfirmQueue] = useState([]);
  const [confirmDel, setConfirmDel] = useState(null);
  useEffect(() => {
    if (savedConfirmQueue.length === 0) return;
    const t = setTimeout(() => setSavedConfirmQueue(q => q.slice(1)), 5000);
    return () => clearTimeout(t);
  }, [savedConfirmQueue]);
  const savedConfirm = savedConfirmQueue[0] || null;
  const [form, setForm] = useState({ clientId:'', clientName:'', type:'', startDate:today(), time:'', endDate:'', status:'Em andamento', value:'', currency:'BRL', description:'', result:'', pagamento:'na_hora', valorPago:'', vencimento:'' });

  const filtered = works.filter(w => {
    const cl = clients.find(c => c.id === w.clientId);
    const name = cl ? (cl.nickname || cl.name) : w.clientName || '';
    const matchSearch = name.toLowerCase().includes(search.toLowerCase()) || (w.type && w.type.toLowerCase().includes(search.toLowerCase()));
    const matchStatus = !filterStatus || w.status === filterStatus;
    const matchType = !filterType || w.type === filterType;
    return matchSearch && matchStatus && matchType;
  });

  const { sorted, thProps: wrkThProps, sortKey: wrkSortKey } = useSortable(filtered, 'startDate', 'desc');
  const { paged, page, setPage, totalPages } = usePagination(sorted, PAGE_SIZE, wrkSortKey);

  const agendaDates = [...new Set(sorted.map(w => w.startDate))].sort((a,b) => new Date(a) - new Date(b));

  function openNew() {
    setEditing(null);
    setForm({ clientId:'', clientName:'', type:'', startDate:today(), time:'', endDate:'', status:'Em andamento', value:'', currency:'BRL', description:'', result:'', pagamento:'na_hora', valorPago:'', vencimento:'' });
    setShowModal(true);
  }

  function openEdit(w) {
    setEditing(w.id);
    setForm({ clientId:w.clientId||'', clientName:w.clientName||'', type:w.type||'', startDate:w.startDate||today(), time:w.time||'', endDate:w.endDate||'', status:w.status, value:w.value||'', currency:w.currency||'BRL', description:w.description||'', result:w.result||'', pagamento:w.pagamento||'na_hora', valorPago:w.valorPago||'', vencimento:w.vencimento||'' });
    setShowModal(true);
  }

  function save() {
    if (!form.startDate) return;
    const cl = clients.find(c => c.id === form.clientId);
    const entry = { ...form, clientName: cl ? clientName(cl) : form.clientName, createdBy: currentUser };
    if (editing) {
      const updated = works.map(w => w.id === editing ? { ...w, ...entry } : w);
      setWorks(updated); saveData('works', updated); notify('Trabalho atualizado');
    } else {
      const wrkId = newId();
      const updated = [...works, { id: wrkId, ...entry }];
      setWorks(updated); saveData('works', updated);

      const total = parseMoney(form.value);
      const pago = parseMoney(form.valorPago);
      const restante = form.pagamento === 'depois' ? total : (form.pagamento === 'parcial' ? total - pago : 0);

      if (restante > 0 && total > 0) {
        const debtClientName = cl ? clientName(cl) : form.clientName;
        const newDebt = {
          id: newId(), clientId: form.clientId || '', clientName: debtClientName,
          description: `${form.type||'Trabalho'} — iniciado em ${formatDate(form.startDate)}`,
          total: String(total), paid: String(form.pagamento === 'parcial' ? pago : 0),
          currency: form.currency, dueDate: form.vencimento || '',
          status: form.pagamento === 'parcial' ? 'Parcial' : 'Aberta', createdAt: today(),
          sourceId: wrkId, sourceType: 'work',
        };
        const updatedDebts = [...(debts||[]), newDebt];
        setDebts(updatedDebts); saveData('debts', updatedDebts);
        notify('Trabalho salvo · Dívida criada automaticamente ✦');
      } else {
        notify('Trabalho registrado');
      }

      setSavedConfirmQueue(q => [...q, {
        clientName: cl ? cl.name : form.clientName || '—',
        type: form.type, date: form.startDate, time: form.time,
        value: form.value, currency: form.currency,
        hasDebt: restante > 0 && total > 0,
        key: newId(),
      }]);
    }
    setShowModal(false);
  }

  function deleteWork(id) {
    setConfirmDel(id);
  }
  function confirmDeleteWork() {
    const updated = works.filter(w => w.id !== confirmDel);
    setWorks(updated); saveData('works', updated); notify('Trabalho removido');
    setConfirmDel(null);
  }

  function quickStatus(id, status) {
    const updated = works.map(w => w.id === id ? { ...w, status } : w);
    setWorks(updated); saveData('works', updated);
  }

  // Groups via shared utility getDateGroups(items, 'startDate')

  return (
    <div>
      {confirmDel && (
        <ConfirmModal
          icon="🕯" title="Remover trabalho?"
          desc="Esta ação não poderá ser desfeita."
          onConfirm={confirmDeleteWork}
          onCancel={() => setConfirmDel(null)}
        />
      )}
      <div className="page-header">
        <h2>Trabalhos Espirituais</h2>
        <p>{works.filter(w => w.status === 'Em andamento').length} em andamento</p>
      </div>

      <div className="table-container">
        <div className="table-header">
          <div className="tabs" style={{border:'none',marginBottom:0}}>
            <button className={`tab${view==='lista'?' active':''}`} onClick={() => setView('lista')}>Lista</button>
            <button className={`tab${view==='agenda'?' active':''}`} onClick={() => setView('agenda')}>Agenda</button>
          </div>
          <button className="btn btn-primary" onClick={openNew}>+ Novo Trabalho</button>
        </div>
        <div className="search-bar">
          <input className="search-input" placeholder="Buscar cliente ou tipo de trabalho..." value={search} onChange={e => setSearch(e.target.value)} />
          <select className="search-input" style={{maxWidth:200}} value={filterType} onChange={e => setFilterType(e.target.value)}>
            <option value="">Todos os tipos</option>
            {WORK_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
          <select className="search-input" style={{maxWidth:170}} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">Todos os status</option>
            {WORK_STATUS.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>

        {view === 'lista' ? (
          sorted.length === 0
            ? <div className="empty-state"><div className="empty-icon">🕯️</div><p>Nenhum trabalho registrado</p></div>
            : <>
                {getDateGroups(paged, 'startDate').map(grp => grp.items.length === 0 ? null : (
                  <React.Fragment key={grp.key}>
                    <div style={{padding:'10px 16px 4px',fontFamily:'DM Mono,monospace',fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:grp.color,background:'rgba(0,0,0,0.2)',borderBottom:'1px solid rgba(128,128,128,0.15)'}}>
                      {grp.label} · {grp.items.length} trabalho{grp.items.length !== 1 ? 's' : ''}
                    </div>
                    <table>
                      <thead><tr>
                        <th {...wrkThProps('clientName')}>Cliente</th>
                        <th {...wrkThProps('type')}>Tipo</th>
                        <th {...wrkThProps('startDate')}>Início</th>
                        <th>Horário</th>
                        <th>Valor / Pgto</th>
                        <th>Término</th>
                        <th {...wrkThProps('status')}>Status</th>
                        <th>Por</th>
                        <th></th>
                      </tr></thead>
                      <tbody>
                        {grp.items.map(w => {
                          const cl = clients.find(c => c.id === w.clientId);
                          const total = parseMoney(w.value);
                          const pago = parseMoney(w.valorPago);
                          const isParcial = w.pagamento === 'parcial' && total > 0;
                          const payLabel = w.pagamento === 'depois'
                            ? { icon:'📅', label:'Paga depois', color:'#e08888' }
                            : w.pagamento === 'parcial'
                              ? { icon:'⚖', label:'Parcial', color:'var(--gold)' }
                              : null;
                          // Ocultar "Paga depois" se dívida quitada
                          const debtQuitada = w.pagamento === 'depois' && (debts||[]).some(d =>
                            d.clientId === w.clientId && d.status === 'Quitada' &&
                            d.description && d.description.includes(formatDate(w.startDate))
                          );
                          const showPayLabel = payLabel && !debtQuitada;
                          return (
                            <tr key={w.id}>
                              <td>
                                {cl
                                  ? <span style={{cursor:'pointer',borderBottom:'1px dotted var(--purple-light)'}} onClick={() => setShowDetail(cl)}>{clientName(cl)}</span>
                                  : (w.clientName || '—')
                                }
                              </td>
                              <td><span className={badgeClass(w.type)}>{w.type || '—'}</span></td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:14}}>{formatDate(w.startDate)}</td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:14}}>{w.time || '—'}</td>
                              <td>
                                {w.value ? (
                                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                    <span style={{fontFamily:'DM Mono,monospace',fontSize:14,color:w.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>
                                      {formatValue(w.value, w.currency)}
                                    </span>
                                    {isParcial && (
                                      <div style={{display:'flex',flexDirection:'column',gap:2}}>
                                        <span style={{fontSize:11,color:'var(--text-dim)',fontFamily:'DM Mono,monospace'}}>
                                          pago <span style={{color:'#7ec8a0'}}>{formatValue(String(pago),w.currency)}</span>
                                        </span>
                                        <span style={{fontSize:11,color:'#e0a870',fontFamily:'DM Mono,monospace'}}>
                                          restam {formatValue(String(Math.max(0,total-pago)),w.currency)}
                                        </span>
                                      </div>
                                    )}
                                    {showPayLabel && !isParcial && (
                                      <span style={{fontSize:11,color:payLabel.color,fontFamily:'DM Mono,monospace'}}>{payLabel.icon} {payLabel.label}</span>
                                    )}
                                    {debtQuitada && (
                                      <span style={{fontSize:11,color:'#7ec8a0',fontFamily:'DM Mono,monospace'}}>✓ quitado</span>
                                    )}
                                  </div>
                                ) : <span style={{color:'var(--text-dim)'}}>—</span>}
                              </td>
                              <td><div className="obs-cell">{w.description || '—'}</div></td>
                              <td style={{fontFamily:'DM Mono,monospace',fontSize:14}}>{formatDate(w.endDate)}</td>
                              <td>
                                <select value={w.status} onChange={e => quickStatus(w.id, e.target.value)}
                                  style={{background:'transparent',border:'none',cursor:'pointer',fontSize:13,fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',
                                    color:w.status==='Concluído'?'#7ec49a':w.status==='Cancelado'?'#e08888':'var(--gold)'}}>
                                  {WORK_STATUS.map(s => <option key={s} style={{background:'#15101f'}}>{s}</option>)}
                                </select>
                              </td>
                              <td><span className="badge badge-user">{w.createdBy || '—'}</span></td>
                              <td>
                                <div style={{display:'flex',gap:6}}>
                                  <button className="btn btn-ghost btn-sm" onClick={() => openEdit(w)}>Editar</button>
                                  <button className="btn btn-danger" onClick={() => deleteWork(w.id)}>✕</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </React.Fragment>
                ))}
                <Pagination page={page} totalPages={totalPages} setPage={setPage} total={sorted.length} />
              </>
        ) : (
          <div style={{padding:'16px 24px'}}>
            {agendaDates.length === 0
              ? <div className="empty-state"><div className="empty-icon">🕯️</div><p>Nenhum trabalho</p></div>
              : agendaDates.map(date => {
                  const isToday = date === today();
                  return (
                    <div key={date} className="agenda-day">
                      <div className={`agenda-day-header${isToday?' today-header':''}`}>
                        {formatDate(date)}{isToday ? ' — Hoje' : ''}
                      </div>
                      {sorted.filter(w => w.startDate === date).sort((a,b) => (a.time||'') > (b.time||'') ? 1 : -1).map(w => {
                        const cl = clients.find(c => c.id === w.clientId);
                        return (
                          <div key={w.id} className={`agenda-item${isToday?' today-item':''}`} onClick={() => openEdit(w)}>
                            <div className="agenda-time">{w.time || '--:--'}</div>
                            <div className="agenda-info" style={{flex:1}}>
                              <h4>{cl ? clientName(cl) : w.clientName || '—'}</h4>
                              <p>{w.type} {w.value && ('· ' + formatValue(w.value, w.currency))}</p>
                              {w.description && <div className="agenda-obs">{w.description}</div>}
                            </div>
                            <span className={badgeClass(w.status)} style={{marginLeft:'auto',alignSelf:'center'}}>{w.status}</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })
            }
          </div>
        )}
      </div>

      {savedConfirm && (
        <div style={{position:'fixed',bottom:24,right:24,zIndex:200,background:'var(--surface)',border:'1px solid var(--purple-light)',padding:'20px 24px',minWidth:300,maxWidth:380,boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontFamily:'Cinzel,serif',fontSize:14,color:'var(--purple-light)',letterSpacing:'0.1em'}}>✦ Trabalho Salvo</span>
            <button onClick={() => setSavedConfirmQueue(q => q.slice(1))} style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:16}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'6px 12px',fontSize:14}}>
            <span style={{color:'var(--text-dim)'}}>Cliente</span><span>{savedConfirm.clientName}</span>
            <span style={{color:'var(--text-dim)'}}>Tipo</span><span>{savedConfirm.type || '—'}</span>
            <span style={{color:'var(--text-dim)'}}>Início</span>
            <span style={{fontFamily:'DM Mono,monospace',color:'var(--gold)'}}>
              {formatDate(savedConfirm.date)}{savedConfirm.time ? (' às ' + savedConfirm.time) : ''}
            </span>
            {savedConfirm.value && (
              <><span style={{color:'var(--text-dim)'}}>Valor</span>
              <span style={{fontFamily:'DM Mono,monospace',color:savedConfirm.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>{formatValue(savedConfirm.value, savedConfirm.currency)}</span></>
            )}
            {savedConfirm.hasDebt && (
              <><span style={{color:'var(--text-dim)'}}>Dívida</span>
              <span style={{color:'#e08888'}}>◉ Criada automaticamente</span></>
            )}
          </div>
        </div>
      )}

      {showDetail && (
        <Modal title="Ficha do Cliente" onClose={() => setShowDetail(null)} wide>
          <div className="detail-grid">
            <div><div className="detail-item-label">Nome</div><div className="detail-item-value">{showDetail.name}</div></div>
            <div><div className="detail-item-label">Telefone</div><div className="detail-item-value">{showDetail.phone || '—'}</div></div>
            <div><div className="detail-item-label">País</div><div className="detail-item-value">{showDetail.country || '—'}</div></div>
            <div><div className="detail-item-label">Nascimento</div><div className="detail-item-value">{formatDate(showDetail.birthdate)}</div></div>
            <div><div className="detail-item-label">Signo</div><div className="detail-item-value">{getZodiac(showDetail.birthdate) || '—'}</div></div>
            <div style={{gridColumn:'1/-1'}}><div className="detail-item-label">Observações</div><div className="detail-item-value" style={{fontStyle:'italic',color:'var(--text-muted)'}}>{showDetail.notes || '—'}</div></div>
          </div>
          <div className="divider-line"/>
          <ClientHistoryTabs
            clientApts={[]}
            clientWrks={sortByDate(works.filter(w => w.clientId === showDetail.id), 'startDate', 'desc')}
            clientDebts={sortByDate((debts||[]).filter(d => d.clientId === showDetail.id && d.status !== 'Quitada'), 'dueDate', 'desc')}
          />
        </Modal>
      )}

      {showModal && (
        <Modal title={editing ? 'Editar Trabalho' : 'Novo Trabalho'} onClose={() => setShowModal(false)} wide
          footer={<><button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Salvar Trabalho</button></>}>
          <div className="form-group">
            <label className="form-label">Cliente</label>
            <ClientSearchSelect
              clients={clients}
              value={form.clientId}
              onChange={id => setForm({...form, clientId:id, clientName:''})}
              clientName={clientName}
            />
            {!form.clientId && (
              <input className="form-input" style={{marginTop:8}} value={form.clientName} onChange={e => setForm({...form, clientName:e.target.value})} placeholder="Ou digitar nome manualmente..." />
            )}
            {form.clientId && (() => {
              const cl = clients.find(c => c.id === form.clientId);
              if (!cl) return null;
              const wrkCount = works.filter(w => w.clientId === cl.id).length;
              const openDebt = (debts||[]).filter(d => d.clientId === cl.id && d.status !== 'Quitada');
              const debtTotal = openDebt.reduce((s, d) => s + parseMoney(getRemaining(d.total, d.paid)), 0);
              return (
                <div className="client-summary">
                  <div className="client-summary-item">Trabalhos: <span>{wrkCount}</span></div>
                  {cl.phone && <div className="client-summary-item">Fone: <span>{cl.phone}</span></div>}
                  {cl.country && <div className="client-summary-item">País: <span>{cl.country}</span></div>}
                  {openDebt.length > 0 && <div className="client-summary-item client-summary-debt">⚠ Dívida em aberto: <span>{formatMoney(debtTotal)}</span></div>}
                  {cl.notes && <div className="client-summary-item" style={{width:'100%',color:'var(--text-muted)',fontStyle:'italic'}}>{cl.notes}</div>}
                </div>
              );
            })()}
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Tipo de Trabalho</label>
              <select className="form-input" value={form.type} onChange={e => setForm({...form, type:e.target.value})}>
                <option value="">— Selecionar —</option>
                {WORK_TYPES.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-input" value={form.status} onChange={e => setForm({...form, status:e.target.value})}>
                {WORK_STATUS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Data de Início</label>
              <input type="date" className="form-input" value={form.startDate} onChange={e => setForm({...form, startDate:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Horário</label>
              <input type="time" className="form-input" value={form.time} onChange={e => setForm({...form, time:e.target.value})} />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Valor</label>
              <CurrencyField value={form.value} currency={form.currency} onValueChange={v => setForm({...form, value:v})} onCurrencyChange={c => setForm({...form, currency:c})} />
            </div>
            <div className="form-group">
              <label className="form-label">Previsão de Término</label>
              <input type="date" className="form-input" value={form.endDate} onChange={e => setForm({...form, endDate:e.target.value})} />
            </div>
          </div>
          {!editing && (
            <div className="form-group">
              <label className="form-label">Pagamento</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[{v:'na_hora',l:'💰 Paga na hora'},{v:'parcial',l:'⚖ Parcial'},{v:'depois',l:'📅 Paga depois'}].map(opt => (
                  <button key={opt.v} type="button" onClick={() => setForm({...form, pagamento:opt.v, valorPago:'', vencimento:''})}
                    style={{padding:'8px 16px',border:'1px solid',borderColor:form.pagamento===opt.v?'var(--purple-light)':'var(--border)',background:form.pagamento===opt.v?'rgba(155,111,212,0.15)':'transparent',color:form.pagamento===opt.v?'var(--purple-light)':'var(--text-dim)',cursor:'pointer',fontSize:14,fontFamily:'Cormorant Garamond,serif',transition:'all 0.2s'}}>
                    {opt.l}
                  </button>
                ))}
              </div>
              {form.pagamento === 'parcial' && (
                <div className="form-row" style={{marginTop:10}}>
                  <div className="form-group">
                    <label className="form-label">Valor pago na hora</label>
                    <input className="form-input" type="number" min="0" step="0.01" value={form.valorPago} onChange={e => setForm({...form, valorPago:e.target.value})} placeholder={`0,00 ${form.currency==='EUR'?'€':'R$'}`} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Vencimento do restante</label>
                    <input type="date" className="form-input" value={form.vencimento} onChange={e => setForm({...form, vencimento:e.target.value})} />
                  </div>
                </div>
              )}
              {form.pagamento === 'depois' && (
                <div className="form-group" style={{marginTop:10}}>
                  <label className="form-label">Data de vencimento</label>
                  <input type="date" className="form-input" value={form.vencimento} onChange={e => setForm({...form, vencimento:e.target.value})} />
                </div>
              )}
              {form.pagamento !== 'na_hora' && parseMoney(form.value) > 0 && (
                <div style={{marginTop:8,padding:'8px 12px',background:'rgba(224,136,136,0.1)',border:'1px solid rgba(224,136,136,0.3)',fontSize:13,color:'#e08888',fontFamily:'DM Mono,monospace'}}>
                  ◉ Dívida de {formatValue(form.pagamento==='parcial' ? String(parseMoney(form.value) - parseMoney(form.valorPago)) : form.value, form.currency)} será criada automaticamente
                </div>
              )}
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Descrição / Pedido</label>
            <textarea className="form-input" value={form.description} onChange={e => setForm({...form, description:e.target.value})} placeholder="Detalhes do que foi pedido, materiais usados, observações..." />
          </div>
          <div className="form-group">
            <label className="form-label">Resultado / Retorno do Cliente</label>
            <textarea className="form-input" value={form.result} onChange={e => setForm({...form, result:e.target.value})} placeholder="O que o cliente relatou, resultado observado..." />
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── FINANCE ──────────────────────────────────────────────
function Finance({ appointments, works, debts, exchangeRate }) {
  const [year, setYear] = useState(new Date().getFullYear());
  const rate = exchangeRate || 6.20;

  const currentYear = new Date().getFullYear();
  const dataYears = [...new Set([
    ...appointments.map(a => a.date ? parseInt(a.date.slice(0,4)) : null),
    ...works.map(w => w.startDate ? parseInt(w.startDate.slice(0,4)) : null),
  ].filter(Boolean))];
  const years = [...new Set([...dataYears, currentYear])].sort((a,b) => a - b);

  // Valor efetivamente recebido de um item (total - dívida vinculada em aberto)
  function receivedValue(item, itemType) {
    const total = parseMoney(item.value);
    if (!total) return 0;
    if (!item.pagamento || item.pagamento === 'na_hora') return total;
    // Prefer exact link via sourceId (set when debt was auto-created)
    const linkedDebt = (debts||[]).find(d => d.sourceId === item.id && d.status !== 'Quitada');
    if (linkedDebt) {
      const unpaid = parseMoney(getRemaining(linkedDebt.total, linkedDebt.paid));
      return Math.max(0, total - unpaid);
    }
    // Fallback: match by clientId + currency (legacy records without sourceId)
    const itemDebts = (debts||[]).filter(d =>
      d.clientId === item.clientId &&
      d.status !== 'Quitada' &&
      d.currency === (item.currency || 'BRL') &&
      !d.sourceId
    );
    const unpaid = itemDebts.reduce((s, d) => s + parseMoney(getRemaining(d.total, d.paid)), 0);
    return Math.max(0, total - unpaid);
  }

  function monthData(m) {
    const prefix = `${year}-${String(m).padStart(2,'0')}`;
    const apts = appointments.filter(a => a.date && a.date.startsWith(prefix) && a.status !== 'Cancelado');
    const wrks = works.filter(w => w.startDate && w.startDate.startsWith(prefix) && w.status !== 'Cancelado');

    const aptBRL = apts.filter(a => (a.currency||'BRL') === 'BRL').reduce((s,a) => s + receivedValue(a,'apt'), 0);
    const aptEUR = apts.filter(a => a.currency === 'EUR').reduce((s,a) => s + receivedValue(a,'apt'), 0);
    const wrkBRL = wrks.filter(w => (w.currency||'BRL') === 'BRL').reduce((s,w) => s + receivedValue(w,'wrk'), 0);
    const wrkEUR = wrks.filter(w => w.currency === 'EUR').reduce((s,w) => s + receivedValue(w,'wrk'), 0);

    const aptTotalEUR = aptEUR + (aptBRL / rate);
    const wrkTotalEUR = wrkEUR + (wrkBRL / rate);

    return { aptBRL, aptEUR, wrkBRL, wrkEUR, aptTotalEUR, wrkTotalEUR, totalEUR: aptTotalEUR + wrkTotalEUR };
  }

  const rows = MONTHS.map((name, i) => ({ name, ...monthData(i + 1) }));
  const grandEUR = rows.reduce((s, r) => s + r.totalEUR, 0);
  // Puros: só pagamentos na moeda original (sem conversão)
  const grandAptEURpure = rows.reduce((s, r) => s + r.aptEUR, 0);
  const grandAptBRL     = rows.reduce((s, r) => s + r.aptBRL, 0);
  const grandWrkEURpure = rows.reduce((s, r) => s + r.wrkEUR, 0);
  const grandWrkBRL     = rows.reduce((s, r) => s + r.wrkBRL, 0);

  const allApts = appointments.filter(a => a.status !== 'Cancelado' && a.date && a.date.startsWith(String(year)));
  const allWrks = works.filter(w => w.status !== 'Cancelado' && w.startDate && w.startDate.startsWith(String(year)));

  const byService = SERVICES.map(s => {
    const items = allApts.filter(a => a.service === s);
    return {
      name: s,
      totalBRL: items.filter(a => (a.currency||'BRL') === 'BRL').reduce((sum, a) => sum + receivedValue(a,'apt'), 0),
      totalEUR: items.filter(a => a.currency === 'EUR').reduce((sum, a) => sum + receivedValue(a,'apt'), 0),
      count: items.length
    };
  }).filter(s => s.count > 0).sort((a,b) => (b.totalBRL + b.totalEUR*rate) - (a.totalBRL + a.totalEUR*rate));

  const byWorkType = WORK_TYPES.map(t => {
    const items = allWrks.filter(w => w.type === t);
    return {
      name: t,
      totalBRL: items.filter(w => (w.currency||'BRL') === 'BRL').reduce((sum, w) => sum + receivedValue(w,'wrk'), 0),
      totalEUR: items.filter(w => w.currency === 'EUR').reduce((sum, w) => sum + receivedValue(w,'wrk'), 0),
      count: items.length
    };
  }).filter(w => w.count > 0).sort((a,b) => (b.totalBRL + b.totalEUR*rate) - (a.totalBRL + a.totalEUR*rate));

  const thisMonth = new Date().getMonth() + 1;
  const currentMonthData = monthData(thisMonth);

  const grandBRL = rows.reduce((s, r) => s + r.aptBRL + r.wrkBRL, 0);
  const grandBRLApt = rows.reduce((s, r) => s + r.aptBRL, 0);
  const grandBRLWrk = rows.reduce((s, r) => s + r.wrkBRL, 0);

  const byServiceBRL = SERVICES.map(s => ({
    name: s,
    total: allApts.filter(a => a.service === s && (a.currency||'BRL') === 'BRL').reduce((sum,a) => sum + receivedValue(a,'apt'), 0),
    count: allApts.filter(a => a.service === s && (a.currency||'BRL') === 'BRL').length,
  })).filter(s => s.count > 0).sort((a,b) => b.total - a.total);

  const byWorkTypeBRL = WORK_TYPES.map(t => ({
    name: t,
    total: allWrks.filter(w => w.type === t && (w.currency||'BRL') === 'BRL').reduce((sum,w) => sum + receivedValue(w,'wrk'), 0),
    count: allWrks.filter(w => w.type === t && (w.currency||'BRL') === 'BRL').length,
  })).filter(w => w.count > 0).sort((a,b) => b.total - a.total);

  const byServiceEUR = SERVICES.map(s => ({
    name: s,
    total: allApts.filter(a => a.service === s && a.currency === 'EUR').reduce((sum,a) => sum + receivedValue(a,'apt'), 0),
    count: allApts.filter(a => a.service === s && a.currency === 'EUR').length,
  })).filter(s => s.count > 0).sort((a,b) => b.total - a.total);

  const byWorkTypeEUR = WORK_TYPES.map(t => ({
    name: t,
    total: allWrks.filter(w => w.type === t && w.currency === 'EUR').reduce((sum,w) => sum + receivedValue(w,'wrk'), 0),
    count: allWrks.filter(w => w.type === t && w.currency === 'EUR').length,
  })).filter(w => w.count > 0).sort((a,b) => b.total - a.total);

  // Separar linhas por moeda para tabelas individuais
  const rowsBRL = rows.map(r => ({ name: r.name, apt: r.aptBRL, wrk: r.wrkBRL, total: r.aptBRL + r.wrkBRL })).filter(r => r.total > 0);
  const rowsEUR = rows.map(r => ({ name: r.name, apt: r.aptEUR, wrk: r.wrkEUR, total: r.aptEUR + r.wrkEUR, totalConv: r.totalEUR })).filter(r => r.total > 0);

  function SectionLabel({ color, label }) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:12,margin:'28px 0 16px'}}>
        <div style={{width:3,height:28,background:color,borderRadius:2}}/>
        <span style={{fontFamily:'Cinzel,serif',fontSize:16,letterSpacing:'0.15em',textTransform:'uppercase',color}}>{label}</span>
      </div>
    );
  }

  function ByTypeList({ items, currency }) {
    if (items.length === 0) return <p style={{color:'var(--text-dim)',fontStyle:'italic',fontSize:15,padding:'0 20px 16px'}}>Sem dados</p>;
    const color = currency === 'BRL' ? 'var(--purple-light)' : 'var(--gold)';
    const symbol = currency === 'BRL' ? 'R$' : '€';
    return (
      <div style={{padding:'12px 20px'}}>
        {items.map(s => (
          <div key={s.name} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <span style={{fontSize:14,color:'var(--text)'}}>{s.name}</span>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color}}>{symbol} {formatMoney(s.total)}</span>
            </div>
            <div style={{height:2,background:'var(--border)',borderRadius:1}}>
              <div style={{height:'100%',width:`${(s.total/items[0].total)*100}%`,background:color,transition:'width 0.4s',borderRadius:1}}/>
            </div>
            <div style={{fontSize:12,color:'var(--text-dim)',fontStyle:'italic',marginTop:3}}>{s.count} registro{s.count!==1?'s':''}</div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Faturamento</h2>
        <p>Resumo financeiro · Taxa de câmbio: 1 € = R$ {rate.toFixed(2)}</p>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text-dim)',letterSpacing:'0.2em',textTransform:'uppercase'}}>Ano</span>
        {years.map(y => (
          <button key={y} className={`page-btn${year===y?' active':''}`} onClick={() => setYear(y)}>{y}</button>
        ))}
      </div>

      {/* RESUMO DO MÊS — card único com as duas moedas */}
      <div className="cards-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:8}}>
        <div className="stat-card gold">
          <div className="stat-label">Este Mês — Total €</div>
          <div className="stat-value" style={{fontSize:20}}>€ {formatMoney(currentMonthData.totalEUR)}</div>
          <div className="stat-sub">{MONTHS[thisMonth - 1]} · tudo convertido</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">Este Mês — R$</div>
          <div className="stat-value" style={{fontSize:20}}>R$ {formatMoney(currentMonthData.aptBRL + currentMonthData.wrkBRL)}</div>
          <div className="stat-sub">{MONTHS[thisMonth - 1]} · pagamentos em reais</div>
        </div>
        <div className="stat-card sage">
          <div className="stat-label">Este Mês — €</div>
          <div className="stat-value" style={{fontSize:20}}>€ {formatMoney(currentMonthData.aptEUR + currentMonthData.wrkEUR)}</div>
          <div className="stat-sub">{MONTHS[thisMonth - 1]} · pagamentos em euro</div>
        </div>
      </div>

      {/* ══ SEÇÃO REAIS ══════════════════════════════════════ */}
      <SectionLabel color="var(--purple-light)" label="Pagamentos em Reais (R$)" />

      <div className="cards-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:16}}>
        <div className="stat-card purple">
          <div className="stat-label">Total Ano R$</div>
          <div className="stat-value" style={{fontSize:20}}>R$ {formatMoney(grandBRL)}</div>
          <div className="stat-sub">atend. + trab. · {year}</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">Atendimentos R$</div>
          <div className="stat-value" style={{fontSize:20}}>R$ {formatMoney(grandBRLApt)}</div>
          <div className="stat-sub">ano {year}</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">Trabalhos R$</div>
          <div className="stat-value" style={{fontSize:20}}>R$ {formatMoney(grandBRLWrk)}</div>
          <div className="stat-sub">ano {year}</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:8}}>
        <div className="table-container">
          <div className="table-header"><span className="table-title">Mês a Mês — R$ · {year}</span></div>
          {rowsBRL.length === 0
            ? <div className="empty-state"><div className="empty-icon">◈</div><p>Nenhum pagamento em reais em {year}</p></div>

// ── DEBTS ────────────────────────────────────────────────
function Debts({ clients, debts, setDebts, notify }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [partialId, setPartialId] = useState(null);
  const [partialValue, setPartialValue] = useState('');
  const [form, setForm] = useState({ clientId:'', clientName:'', description:'', total:'', paid:'', currency:'BRL', dueDate:'', status:'Aberta' });

  const [filterStatus, setFilterStatus] = useState('abertas');
  const [search, setSearch] = useState('');
  const [confirmDel, setConfirmDel] = useState(null);

  const sorted = sortByDate(
    debts.filter(d => {
      const cl = clients.find(c => c.id === d.clientId);
      const nameMatch = !search || (cl ? clientName(cl) : d.clientName || '').toLowerCase().includes(search.toLowerCase());
      if (!nameMatch) return false;
      if (filterStatus === 'abertas') return d.status !== 'Quitada';
      if (filterStatus === 'quitadas') return d.status === 'Quitada';
      return true;
    }),
    'dueDate', 'asc'
  );
  const { paged, page, setPage, totalPages } = usePagination(sorted);

  const totalOwedBRL = debts.filter(d => d.status !== 'Quitada' && (d.currency||'BRL') === 'BRL').reduce((s,d) => s + getRemaining(d.total, d.paid), 0);
  const totalOwedEUR = debts.filter(d => d.status !== 'Quitada' && d.currency === 'EUR').reduce((s,d) => s + getRemaining(d.total, d.paid), 0);

  function openNew() {
    setEditing(null);
    setForm({ clientId:'', clientName:'', description:'', total:'', paid:'', currency:'BRL', dueDate:'', status:'Aberta' });
    setShowModal(true);
  }

  function openEdit(d) {
    setEditing(d.id);
    setForm({ clientId:d.clientId||'', clientName:d.clientName||'', description:d.description||'', total:d.total||'', paid:d.paid||'', currency:d.currency||'BRL', dueDate:d.dueDate||'', status:d.status });
    setShowModal(true);
  }

  function save() {
    if (!form.description || !form.total) return;
    const cl = clients.find(c => c.id === form.clientId);
    const entry = { ...form, clientName: cl ? clientName(cl) : form.clientName };
    if (editing) {
      const updated = debts.map(d => d.id === editing ? { ...d, ...entry } : d);
      setDebts(updated); saveData('debts', updated); notify('Dívida atualizada');
    } else {
      const updated = [...debts, { id: newId(), createdAt: today(), ...entry }];
      setDebts(updated); saveData('debts', updated); notify('Dívida registrada');
    }
    setShowModal(false);
  }

  function markPaid(id) {
    const updated = debts.map(d => d.id === id ? { ...d, paid: d.total, status: 'Quitada' } : d);
    setDebts(updated); saveData('debts', updated); notify('Dívida quitada ✦');
  }

  function registerPartial(id) {
    const d = debts.find(x => x.id === id);
    if (!d) return;
    const addPaid = parseMoney(partialValue);
    if (!addPaid || addPaid <= 0) return;
    const newPaid = parseMoney(d.paid) + addPaid;
    const total = parseMoney(d.total);
    const isNowPaid = newPaid >= total;
    const updated = debts.map(x => x.id === id
      ? { ...x, paid: String(Math.min(newPaid, total)), status: isNowPaid ? 'Quitada' : 'Aberta' }
      : x
    );
    setDebts(updated); saveData('debts', updated);
    notify(isNowPaid ? 'Dívida quitada ✦' : `Pagamento de ${formatValue(partialValue, d.currency)} registrado`);
    setPartialId(null);
    setPartialValue('');
  }

  function deleteDebt(id) {
    setConfirmDel(id);
  }
  function confirmDeleteDebt() {
    const updated = debts.filter(d => d.id !== confirmDel);
    setDebts(updated); saveData('debts', updated); notify('Dívida removida');
    setConfirmDel(null);
  }

  function isOverdueDebt(d) {
    if (d.status === 'Quitada') return false;
    if (!d.dueDate) return false;
    return new Date(d.dueDate) < new Date(today());
  }

  return (
    <div>
      {confirmDel && (
        <ConfirmModal
          icon="◉" title="Remover dívida?"
          desc="Esta ação não poderá ser desfeita."
          onConfirm={confirmDeleteDebt}
          onCancel={() => setConfirmDel(null)}
        />
      )}
      <div className="page-header">
        <h2>Dívidas</h2>
        <p>{debts.filter(d => d.status !== 'Quitada').length} dívidas em aberto</p>
      </div>

      <div className="cards-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card crimson">
          <div className="stat-label">Em Aberto R$</div>
          <div className="stat-value" style={{fontSize:22}}>R$ {formatMoney(totalOwedBRL)}</div>
          <div className="stat-sub">a receber em reais</div>
        </div>
        <div className="stat-card crimson">
          <div className="stat-label">Em Aberto €</div>
          <div className="stat-value" style={{fontSize:22}}>€ {formatMoney(totalOwedEUR)}</div>
          <div className="stat-sub">a receber em euros</div>
        </div>
        <div className="stat-card gold">
          <div className="stat-label">Quitadas</div>
          <div className="stat-value" style={{fontSize:22}}>{debts.filter(d => d.status === 'Quitada').length}</div>
          <div className="stat-sub">dívidas</div>
        </div>
      </div>

      <div className="table-container">
        <div className="table-header">
          <span className="table-title">Registro de Dívidas</span>
          <button className="btn btn-primary" onClick={openNew}>+ Nova Dívida</button>
        </div>
        <div className="search-bar" style={{display:'flex',gap:10,alignItems:'center'}}>
          <input className="search-input" style={{flex:1}} placeholder="Buscar por apelido ou nome..." value={search} onChange={e => setSearch(e.target.value)} />
          <select className="form-input" style={{width:'auto',minWidth:160,padding:'8px 12px',fontSize:13}} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="todas">Todas as dívidas</option>
            <option value="abertas">Em aberto</option>
            <option value="quitadas">Quitadas</option>
          </select>
        </div>

        {sorted.length === 0
          ? <div className="empty-state"><div className="empty-icon">✦</div><p>Nenhuma dívida registrada</p></div>
          : <>
            <table>
              <thead><tr>
                <th>Cliente</th><th>Descrição</th><th>Total</th><th>Pago</th><th>Falta</th><th>Vencimento</th><th>Status</th><th></th>
              </tr></thead>
              <tbody>
                {paged.map(d => {
                  const cl = clients.find(c => c.id === d.clientId);
                  const remaining = getRemaining(d.total, d.paid);
                  const overdue = isOverdueDebt(d);
                  const isOpen = partialId === d.id;
                  // Status display: "Parcial" shown as "Aberta"
                  const displayStatus = d.status === 'Parcial' ? 'Aberta' : d.status;
                  const badgeCls = d.status === 'Quitada' ? 'badge badge-concluido' : 'badge badge-pendente';
                  return (
                    <React.Fragment key={d.id}>
                      <tr style={{
                        background: overdue ? 'rgba(224,136,136,0.07)' : 'transparent',
                        borderLeft: overdue ? '2px solid #e08888' : '2px solid transparent',
                      }}>
                        <td>{cl ? clientName(cl) : d.clientName || '—'}</td>
                        <td style={{fontSize:15,color: d.status==='Quitada'?'var(--text-dim)':'var(--text)'}}>{d.description}</td>
                        <td style={{fontFamily:'DM Mono,monospace',fontSize:14,color:d.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>{formatValue(d.total, d.currency)}</td>
                        <td style={{fontFamily:'DM Mono,monospace',fontSize:14}} className="debt-paid">{formatValue(d.paid||0, d.currency)}</td>
                        <td style={{fontFamily:'DM Mono,monospace',fontSize:14}} className={remaining > 0 ? 'debt-overdue' : 'debt-paid'}>
                          {formatValue(remaining, d.currency)}
                        </td>
                        <td style={{fontFamily:'DM Mono,monospace',fontSize:14,color: overdue ? '#e08888' : 'var(--text-muted)'}}>
                          {formatDate(d.dueDate)}{overdue ? ' ⚠' : ''}
                        </td>
                        <td><span className={badgeCls}>{displayStatus}</span></td>
                        <td>
                          <div style={{display:'flex',gap:4,alignItems:'center'}}>
                            {d.status !== 'Quitada' && <>
                              <button title="Quitar dívida" className="btn btn-sage btn-sm" onClick={() => markPaid(d.id)} style={{padding:'4px 8px',fontSize:13}}>✓</button>
                              <button title="Registrar pagamento parcial" className="btn btn-ghost btn-sm" onClick={() => { setPartialId(isOpen ? null : d.id); setPartialValue(''); }}
                                style={{padding:'4px 8px',fontSize:13,color: isOpen ? 'var(--purple-light)' : 'var(--text-dim)'}}>＋</button>
                            </>}
                            <button title="Editar" className="btn btn-ghost btn-sm" onClick={() => openEdit(d)} style={{padding:'4px 8px',fontSize:13}}>✎</button>
                            <button title="Remover" className="btn btn-danger" onClick={() => deleteDebt(d.id)} style={{padding:'4px 8px',fontSize:13}}>✕</button>
                          </div>
                        </td>
                      </tr>
                      {isOpen && (
                        <tr style={{background:'rgba(155,111,212,0.06)'}}>
                          <td colSpan={8} style={{padding:'10px 16px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:10}}>
                              <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text-dim)',letterSpacing:'0.1em',whiteSpace:'nowrap'}}>
                                REGISTRAR PAGAMENTO — falta {formatValue(remaining, d.currency)}
                              </span>
                              <input
                                type="number" min="0" step="0.01"
                                className="form-input"
                                style={{maxWidth:140,padding:'6px 10px',fontSize:14}}
                                placeholder={`0,00 ${d.currency==='EUR'?'€':'R$'}`}
                                value={partialValue}
                                onChange={e => setPartialValue(e.target.value)}
                                autoFocus
                              />
                              <button className="btn btn-primary btn-sm" onClick={() => registerPartial(d.id)}>Confirmar</button>
                              <button className="btn btn-ghost btn-sm" onClick={() => { setPartialId(null); setPartialValue(''); }}>Cancelar</button>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
            <Pagination page={page} totalPages={totalPages} setPage={setPage} total={sorted.length} />
          </>
        }
      </div>

      {showModal && (
        <Modal
          title={editing ? 'Editar Dívida' : 'Nova Dívida'}
          onClose={() => setShowModal(false)}
          footer={<>
            <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save}>Salvar</button>
          </>}
        >
          <div className="form-group">
            <label className="form-label">Cliente</label>
            <select className="form-input" value={form.clientId} onChange={e => setForm({...form, clientId:e.target.value, clientName:''})}>
              <option value="">— Selecionar cliente —</option>
              {clients.map(c => <option key={c.id} value={c.id}>{clientName(c)}</option>)}
            </select>
          </div>
          {!form.clientId && (
            <div className="form-group">
              <label className="form-label">Ou digitar nome</label>
              <input className="form-input" value={form.clientName} onChange={e => setForm({...form, clientName:e.target.value})} placeholder="Nome" />
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Descrição *</label>
            <input className="form-input" value={form.description} onChange={e => setForm({...form, description:e.target.value})} placeholder="Ex: Trabalho de proteção, Leitura parcelada..." />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Valor Total *</label>
              <CurrencyField
                value={form.total}
                currency={form.currency}
                onValueChange={v => setForm({...form, total:v})}
                onCurrencyChange={c => setForm({...form, currency:c})}
              />
            </div>
            <div className="form-group">
              <label className="form-label">Valor Pago</label>
              <input type="number" min="0" step="0.01" className="form-input" value={form.paid} onChange={e => setForm({...form, paid:e.target.value})} placeholder="0,00" />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Vencimento</label>
              <input type="date" className="form-input" value={form.dueDate} onChange={e => setForm({...form, dueDate:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-input" value={form.status} onChange={e => setForm({...form, status:e.target.value})}>
                {DEBT_STATUS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
