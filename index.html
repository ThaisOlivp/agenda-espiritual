// ── SETTINGS ─────────────────────────────────────────────
function Settings({ clients, appointments, works, debts, setClients, setAppointments, setWorks, setDebts, notify, exchangeRate, setExchangeRate }) {
  const fileRef = useRef();
  const [rateInput, setRateInput] = useState(String(exchangeRate));

  function saveRate() {
    const v = parseFloat(rateInput.replace(',','.'));
    if (!v || v <= 0) return;
    setExchangeRate(v);
    saveData('exchangeRate', v);
    notify('Taxa de câmbio atualizada');
  }

  function exportBackup() {
    const data = { clients, appointments, works, debts, exportedAt: new Date().toISOString(), version: '2.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `agenda-espiritual-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    notify('Backup exportado com sucesso');
  }

  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.clients && !data.appointments) { notify('Arquivo inválido'); return; }
        if (!window.confirm(`Restaurar backup de ${data.exportedAt ? new Date(data.exportedAt).toLocaleString('pt-BR') : 'data desconhecida'}?\nIsso substituirá todos os dados atuais.`)) return;
        if (data.clients) { setClients(data.clients); saveData('clients', data.clients); }
        if (data.appointments) { setAppointments(data.appointments); saveData('appointments', data.appointments); }
        if (data.works) { setWorks(data.works); saveData('works', data.works); }
        if (data.debts) { setDebts(data.debts); saveData('debts', data.debts); }
        notify('Backup restaurado com sucesso ✦');
      } catch { notify('Erro ao ler o arquivo'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  const stats = [
    { label: 'Clientes', value: clients.length },
    { label: 'Atendimentos', value: appointments.length },
    { label: 'Trabalhos', value: works.length },
    { label: 'Dívidas', value: debts.length },
  ];

  return (
    <div>
      <div className="page-header">
        <h2>Configurações</h2>
        <p>Backup e informações do sistema</p>
      </div>

      <div className="table-container" style={{marginBottom:20}}>
        <div className="table-header"><span className="table-title">Taxa de Câmbio</span></div>
        <div style={{padding:'20px 24px'}}>
          <div className="settings-row">
            <div className="settings-row-info">
              <h4>1 € equivale a quantos R$?</h4>
              <p>Usado para converter R$ em € no Faturamento mensal</p>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--text-muted)'}}>1 € =</span>
              <input
                className="form-input"
                style={{width:100,textAlign:'right'}}
                value={rateInput}
                onChange={e => setRateInput(e.target.value)}
                placeholder="6.20"
              />
              <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--text-muted)'}}>R$</span>
              <button className="btn btn-primary btn-sm" onClick={saveRate}>Salvar</button>
            </div>
          </div>
        </div>
      </div>

      <div className="table-container" style={{marginBottom:20}}>
        <div className="table-header"><span className="table-title">Dados do Sistema</span></div>
        <div style={{padding:'20px 24px', display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16}}>
          {stats.map(s => (
            <div key={s.label}>
              <div className="stat-mini-label">{s.label}</div>
              <div className="stat-mini-value">{s.value}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="table-container">
        <div className="table-header"><span className="table-title">Backup e Restauração</span></div>
        <div style={{padding:'24px'}}>
          <div className="settings-section">
            <div className="settings-row">
              <div className="settings-row-info">
                <h4>Exportar Backup</h4>
                <p>Salva todos os dados em um arquivo JSON que pode ser restaurado depois</p>
              </div>
              <button className="btn btn-primary" onClick={exportBackup}>⬇ Exportar JSON</button>
            </div>
            <div className="settings-row">
              <div className="settings-row-info">
                <h4>Restaurar Backup</h4>
                <p>Atenção: substitui todos os dados atuais pelo arquivo selecionado</p>
              </div>
              <button className="btn btn-ghost" onClick={() => fileRef.current.click()}>⬆ Importar JSON</button>
            </div>
            <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importBackup} />
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SORT HOOK ────────────────────────────────────────────
function useSortable(items, defaultField, defaultDir = 'asc') {
  const [sortField, setSortField] = useState(defaultField);
  const [sortDir, setSortDir] = useState(defaultDir);

  function toggleSort(field) {
    if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortField(field); setSortDir('asc'); }
  }

  const sorted = [...items].sort((a, b) => {
    let va = a[sortField] ?? '';
    let vb = b[sortField] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  function thProps(field) {
    return {
      className: `sortable${sortField === field ? ` ${sortDir}` : ''}`,
      onClick: () => toggleSort(field),
    };
  }

  // sortKey changes whenever the sort order changes, used by usePagination to reset page
  const sortKey = `${sortField}:${sortDir}`;

  return { sorted, thProps, sortField, sortDir, sortKey };
}

// ── GLOBAL SEARCH ────────────────────────────────────────

function ClientSearchSelect({ clients, value, onChange, clientName }) {
  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  const sorted = [...clients].filter(c => !c.inactive).sort((a, b) =>
    clientName(a).localeCompare(clientName(b), 'pt', { sensitivity: 'base' })
  );

  const filtered = query.trim().length > 0
    ? sorted.filter(c => clientName(c).toLowerCase().includes(query.toLowerCase()))
    : sorted;

  const selected = clients.find(c => c.id === value);

  React.useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  function select(id) {
    onChange(id);
    setQuery('');
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:'relative'}}>
      <div
        className="form-input"
        style={{cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',userSelect:'none'}}
        onClick={() => { setOpen(o => !o); setTimeout(() => { if (ref.current) { const inp = ref.current.querySelector('input'); if (inp) inp.focus(); }}, 50); }}
      >
        <span style={{color: selected ? 'var(--text)' : 'var(--text-dim)'}}>
          {selected ? clientName(selected) : '— Selecionar cliente cadastrado —'}
        </span>
        <span style={{fontSize:10,color:'var(--text-dim)'}}>▼</span>
      </div>
      {open && (
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'var(--surface2)',border:'1px solid var(--border-hover)',zIndex:999,maxHeight:280,display:'flex',flexDirection:'column',boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
          <input
            className="form-input"
            style={{borderBottom:'1px solid var(--border)',borderRadius:0,flexShrink:0}}
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Buscar cliente..."
            autoFocus
          />
          <div style={{overflowY:'auto',flex:1}}>
            <div
              style={{padding:'10px 14px',cursor:'pointer',fontSize:14,color:'var(--text-dim)',fontStyle:'italic'}}
              onMouseDown={() => select('')}
            >— Nenhum —</div>
            {filtered.length === 0 && (
              <div style={{padding:'10px 14px',fontSize:14,color:'var(--text-dim)',fontStyle:'italic'}}>Nenhum resultado</div>
            )}
            {filtered.map(c => (
              <div
                key={c.id}
                style={{padding:'10px 14px',cursor:'pointer',fontSize:15,background: c.id === value ? 'rgba(155,111,212,0.15)' : 'transparent',color: c.id === value ? 'var(--purple-light)' : 'var(--text)'}}
                onMouseDown={() => select(c.id)}
                onMouseEnter={e => e.currentTarget.style.background='rgba(155,111,212,0.08)'}
                onMouseLeave={e => e.currentTarget.style.background= c.id === value ? 'rgba(155,111,212,0.15)' : 'transparent'}
              >{clientName(c)}</div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function GlobalSearch({ clients, appointments, works, onNavigate, currentPage }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef();
  // Clear search when page changes externally (e.g. sidebar nav click)
  useEffect(() => { setQuery(''); setOpen(false); }, [currentPage]);

  useEffect(() => {
    function handler(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const q = query.toLowerCase().trim();

  const matchClients = q.length < 2 ? [] : clients.filter(c =>
    (c.name.toLowerCase().includes(q) || (c.nickname && c.nickname.toLowerCase().includes(q)) || (c.phone && c.phone.includes(q)))
  ).slice(0, 4);

  const matchApts = q.length < 2 ? [] : appointments.filter(a => {
    const cl = clients.find(c => c.id === a.clientId);
    const name = cl ? cl.name : a.clientName || '';
    return name.toLowerCase().includes(q) || a.service.toLowerCase().includes(q) || (a.notes && a.notes.toLowerCase().includes(q));
  }).slice(0, 4);

  const matchWorks = q.length < 2 ? [] : works.filter(w => {
    const cl = clients.find(c => c.id === w.clientId);
    const name = cl ? cl.name : w.clientName || '';
    return name.toLowerCase().includes(q) || (w.type && w.type.toLowerCase().includes(q));
  }).slice(0, 3);

  const hasResults = matchClients.length + matchApts.length + matchWorks.length > 0;

  return (
    <div className="topbar-search" ref={ref}>
      <span className="topbar-search-icon">🔍</span>
      <input
        placeholder="Buscar clientes, atendimentos, trabalhos..."
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
      />
      {open && q.length >= 2 && (
        <div className="search-results">
          {!hasResults && (
            <div style={{padding:'20px',textAlign:'center',color:'var(--text-dim)',fontStyle:'italic',fontSize:15}}>Nenhum resultado encontrado</div>
          )}
          {matchClients.length > 0 && (
            <div className="search-result-section">
              <div className="search-result-label">✦ Clientes</div>
              {matchClients.map(c => (
                <div key={c.id} className="search-result-item" onClick={() => { onNavigate('clients'); setQuery(''); setOpen(false); }}>
                  <div>
                    <div className="search-result-item-main">{clientName(c)}</div>
                    <div className="search-result-item-sub">{c.phone || c.country || '—'} {c.inactive ? '· inativo' : ''}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {matchApts.length > 0 && (
            <div className="search-result-section">
              <div className="search-result-label">◷ Atendimentos</div>
              {matchApts.map(a => {
                const cl = clients.find(c => c.id === a.clientId);
                return (
                  <div key={a.id} className="search-result-item" onClick={() => { onNavigate('appointments'); setQuery(''); setOpen(false); }}>
                    <div>
                      <div className="search-result-item-main">{cl ? clientName(cl) : a.clientName || '—'}</div>
                      <div className="search-result-item-sub">{a.service} · {formatDate(a.date)} · <span className={badgeClass(a.status)}>{a.status}</span></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {matchWorks.length > 0 && (
            <div className="search-result-section">
              <div className="search-result-label">🕯 Trabalhos</div>
              {matchWorks.map(w => {
                const cl = clients.find(c => c.id === w.clientId);
                return (
                  <div key={w.id} className="search-result-item" onClick={() => { onNavigate('works'); setQuery(''); setOpen(false); }}>
                    <div>
                      <div className="search-result-item-main">{cl ? clientName(cl) : w.clientName || '—'}</div>
                      <div className="search-result-item-sub">{w.type} · {formatDate(w.startDate)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────
function App() {
  const [currentUser, setCurrentUser] = useState(() => loadData('currentUser', null));
  const [page, setPage] = useState('dashboard');
  const [clients, setClients] = useState(() => loadData('clients', []));
  const [appointments, setAppointments] = useState(() => loadData('appointments', []));
  const [works, setWorks] = useState(() => loadData('works', []));
  const [debts, setDebts] = useState(() => loadData('debts', []));
  const [exchangeRate, setExchangeRate] = useState(() => loadData('exchangeRate', 6.20));
  const [notification, setNotification] = useState(null);



  function notify(msg) {
    setNotification(msg);
    setTimeout(() => setNotification(null), 3100);
  }

  function handleLogin(user) {
    setCurrentUser(user);
    saveData('currentUser', user);
  }

  function handleLogout() {
    setCurrentUser(null);
    saveData('currentUser', null);
    setPage('dashboard');
  }

  if (!currentUser) return <Login onLogin={handleLogin} />;

  const NAV = [
    { id: 'dashboard',    icon: '◈',  label: 'Visão Geral' },
    { id: 'appointments', icon: '◷',  label: 'Agendamentos' },
    { id: 'clients',      icon: '✦',  label: 'Clientes' },
    { id: 'works',        icon: '🕯', label: 'Trabalhos' },
    { id: 'finance',      icon: '◆',  label: 'Faturamento' },
    { id: 'debts',        icon: '◉',  label: 'Dívidas' },
    { id: 'settings',     icon: '⚙',  label: 'Configurações' },
  ];

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>Agenda<br/>Espiritual</h1>
          <p>Vivi de Mulambo</p>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-user-dot"/>
          <span className="sidebar-user-name">{currentUser}</span>
          <button className="sidebar-user-logout" onClick={handleLogout}>Sair</button>
        </div>
        <nav className="sidebar-nav">
          {NAV.map(n => (
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-stats">
          <div className="stat-mini">
            <div className="stat-mini-label">Total Clientes</div>
            <div className="stat-mini-value">{clients.length}</div>
          </div>
          <div className="stat-mini">
            <div className="stat-mini-label">Atendimentos</div>
            <div className="stat-mini-value">{appointments.length}</div>
          </div>
        </div>
      </aside>

      <main className="main main-with-topbar">
        <div className="topbar">
          <GlobalSearch clients={clients} appointments={appointments} works={works} onNavigate={setPage} currentPage={page} />

        </div>
        {page === 'dashboard'    && <Dashboard clients={clients} appointments={appointments} works={works} debts={debts} currentUser={currentUser} onNavigate={setPage} />}
        {page === 'appointments' && <Appointments clients={clients} appointments={appointments} setAppointments={setAppointments} debts={debts} setDebts={setDebts} notify={notify} currentUser={currentUser} />}
        {page === 'clients'      && <Clients clients={clients} setClients={setClients} appointments={appointments} works={works} debts={debts} notify={notify} currentUser={currentUser} />}
        {page === 'works'        && <Works clients={clients} works={works} setWorks={setWorks} debts={debts} setDebts={setDebts} notify={notify} currentUser={currentUser} />}
        {page === 'finance'      && <Finance appointments={appointments} works={works} debts={debts} exchangeRate={exchangeRate} />}
        {page === 'debts'        && <Debts clients={clients} debts={debts} setDebts={setDebts} notify={notify} />}
        {page === 'settings'     && <Settings clients={clients} appointments={appointments} works={works} debts={debts} setClients={setClients} setAppointments={setAppointments} setWorks={setWorks} setDebts={setDebts} notify={notify} exchangeRate={exchangeRate} setExchangeRate={setExchangeRate} />}
      </main>

      {notification && <Notification msg={notification} onClose={() => setNotification(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
