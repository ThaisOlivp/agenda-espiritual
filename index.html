<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Espiritual — Vivi de Mulambo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d0a12;
  --surface: #15101f;
  --surface2: #1e1630;
  --border: rgba(160,120,220,0.15);
  --border-hover: rgba(160,120,220,0.35);
  --gold: #c9a84c;
  --gold-light: #e8d080;
  --purple: #9b6fd4;
  --purple-light: #c49ef0;
  --crimson: #c0404a;
  --sage: #5a9e7a;
  --text: #e8e0f0;
  --text-muted: #8878a8;
  --text-dim: #5a4e78;
  --font-base: 18px;
}

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: var(--font-base);
}

.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo h1 {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 0.08em;
  font-weight: 400;
  line-height: 1.4;
}

.sidebar-logo p {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 4px;
}

.sidebar-user {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-user-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
}

.sidebar-user-name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.sidebar-user-logout {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: none;
  padding: 2px 6px;
}
.sidebar-user-logout:hover { color: var(--crimson); }

.sidebar-nav { flex: 1; padding: 16px 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 2px solid transparent;
  font-size: 15px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

.nav-item:hover { color: var(--text); background: rgba(155,111,212,0.08); }
.nav-item.active { color: var(--purple-light); border-left-color: var(--purple); background: rgba(155,111,212,0.12); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-stats {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.stat-mini { margin-bottom: 10px; }
.stat-mini-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
.stat-mini-value { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); margin-top: 2px; }

/* MAIN */
.main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }

/* PAGE HEADER */
.page-header { margin-bottom: 28px; }
.page-header h2 { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 400; color: var(--text); }
.page-header p { font-size: 15px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

/* CARDS GRID */
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
}

.stat-card.gold::before { background: var(--gold); }
.stat-card.purple::before { background: var(--purple); }
.stat-card.sage::before { background: var(--sage); }
.stat-card.crimson::before { background: var(--crimson); }

.stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: 'Cinzel', serif; font-size: 30px; color: var(--text); }
.stat-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

/* TABLE */
.table-container {
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 20px;
}

.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}

.table-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 400; color: var(--text); }

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 9px 18px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-primary { background: var(--purple); color: white; }
.btn-primary:hover { background: var(--purple-light); color: var(--bg); }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
.btn-danger { background: transparent; color: var(--crimson); border: 1px solid rgba(192,64,74,0.3); font-size: 11px; padding: 5px 10px; }
.btn-danger:hover { background: rgba(192,64,74,0.1); }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-sage { background: var(--sage); color: white; }
.btn-sage:hover { opacity: 0.85; }

table { width: 100%; border-collapse: collapse; }
th {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 13px 20px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 15px 20px;
  font-size: 15px;
  color: var(--text-muted);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}

td:first-child { color: var(--text); font-size: 16px; }
tr:hover td { background: rgba(155,111,212,0.05); }
tr:last-child td { border-bottom: none; }

/* BADGE */
.badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 10px;
}

.badge-tarot { background: rgba(155,111,212,0.2); color: var(--purple-light); }
.badge-buzios { background: rgba(75,185,205,0.2); color: #7dd5e8; }
.badge-limpeza { background: rgba(90,158,122,0.15); color: #7ec49a; }
.badge-radionica { background: rgba(100,155,245,0.2); color: #9ab8f5; }
.badge-trabalho { background: rgba(192,64,74,0.2); color: #e08888; }
.badge-pendente { background: rgba(201,168,76,0.2); color: var(--gold); }
.badge-confirmado { background: rgba(100,155,245,0.2); color: #9ab8f5; }
.badge-concluido { background: rgba(90,158,122,0.2); color: #7ec49a; }
.badge-cancelado { background: rgba(192,64,74,0.15); color: #e08888; }
.badge-andamento { background: rgba(201,168,76,0.15); color: var(--gold); }
.badge-atrasado { background: rgba(192,64,74,0.3); color: #ff9999; animation: pulse 2s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* SEARCH */
.search-bar {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 140px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--purple); }
.search-input::placeholder { color: var(--text-dim); }
select.search-input { cursor: pointer; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.modal-header h3 { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 400; color: var(--text); }

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }

.modal-body { padding: 24px; }

.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 7px;
}

.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 14px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--purple); }
.form-input::placeholder { color: var(--text-dim); }
select.form-input { cursor: pointer; }
textarea.form-input { resize: vertical; min-height: 80px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-dim);
}
.empty-state .empty-icon { font-size: 42px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-style: italic; font-size: 16px; }

/* DETAIL VIEW */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.detail-item-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
.detail-item-value { font-size: 16px; color: var(--text); }

.history-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.history-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.history-service { font-size: 15px; color: var(--text); margin-bottom: 4px; }
.history-obs { font-size: 14px; color: var(--text-muted); font-style: italic; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.tab {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 13px 20px;
  cursor: pointer;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab:hover { color: var(--text-muted); }
.tab.active { color: var(--purple-light); border-bottom-color: var(--purple); }

/* NOTIFICATION */
.notification {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--purple);
  padding: 14px 20px;
  font-size: 14px;
  color: var(--text);
  z-index: 2000;
  animation: slideIn 0.3s ease;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.divider-line { height: 1px; background: var(--border); margin: 24px 0; }

/* AGENDA VIEW */
.agenda-day { margin-bottom: 20px; }
.agenda-day-header {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.agenda-day-header.today-header { color: var(--purple-light); }

.agenda-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 13px 16px;
  border: 1px solid var(--border);
  margin-bottom: 6px;
  background: var(--surface);
  transition: border-color 0.2s;
  cursor: pointer;
}
.agenda-item:hover { border-color: var(--border-hover); }
.agenda-item.today-item { border-left: 2px solid var(--purple); }

.agenda-time {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--gold);
  min-width: 50px;
  margin-top: 2px;
}

.agenda-info h4 { font-size: 16px; color: var(--text); margin-bottom: 3px; }
.agenda-info p { font-size: 14px; color: var(--text-muted); font-style: italic; }
.agenda-obs { font-size: 15px; color: var(--text-muted); font-style: italic; margin-top: 3px; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ALERT BANNER */
.alert-banner {
  background: rgba(192,64,74,0.12);
  border: 1px solid rgba(192,64,74,0.4);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.alert-banner-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.alert-banner-content h4 { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #e08888; margin-bottom: 6px; }
.alert-banner-content p { font-size: 14px; color: var(--text-muted); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
}
.page-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.1em;
}
.page-btn:hover { border-color: var(--border-hover); color: var(--text); }
.page-btn.active { background: var(--purple); border-color: var(--purple); color: white; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-info { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }

/* LOGIN */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.login-card h1 {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.login-card p {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.login-users { display: flex; flex-direction: column; gap: 12px; }
.login-user-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  text-align: left;
}
.login-user-btn:hover { border-color: var(--purple); background: rgba(155,111,212,0.08); }
.login-user-icon { font-size: 22px; }
.login-user-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }

/* PHOTO UPLOAD */
.photo-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.photo-thumb {
  width: 90px; height: 90px;
  object-fit: cover;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.photo-thumb:hover { border-color: var(--purple); }
.photo-upload-btn {
  width: 90px; height: 90px;
  border: 1px dashed var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  gap: 4px;
  transition: border-color 0.2s;
  color: var(--text-dim);
  font-size: 22px;
}
.photo-upload-btn:hover { border-color: var(--purple); color: var(--purple-light); }
.photo-upload-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; }

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.lightbox img {
  max-width: 90vw;
  max-height: 80vh;
  object-fit: contain;
  border: 1px solid var(--border);
}
.lightbox-controls { display: flex; gap: 12px; }

/* FINANCE */
.finance-table { width: 100%; border-collapse: collapse; }
.finance-table th {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border);
}
.finance-table th:first-child { text-align: left; }
.finance-table td {
  padding: 11px 16px;
  font-size: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  text-align: right;
  color: var(--text-muted);
}
.finance-table td:first-child { text-align: left; color: var(--text); }
.finance-table tr:last-child td { border-bottom: none; }
.finance-table .total-row td { color: var(--gold); font-family: 'DM Mono', monospace; font-size: 14px; border-top: 1px solid var(--border); }

/* DEBT */
.debt-paid { color: #7ec49a !important; }
.debt-overdue { color: #e08888 !important; }

/* SETTINGS */
.settings-section { margin-bottom: 32px; }
.settings-section h3 { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 400; color: var(--text); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.settings-row-info h4 { font-size: 16px; color: var(--text); margin-bottom: 3px; }
.settings-row-info p { font-size: 14px; color: var(--text-muted); font-style: italic; }

/* OBS in table */
.obs-cell { font-size: 15px; color: var(--text-muted); font-style: italic; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* CURRENCY SELECTOR */
.currency-field { display: flex; gap: 0; }
.currency-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-right: none;
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 11px 10px;
  cursor: pointer;
  outline: none;
  min-width: 56px;
  letter-spacing: 0.05em;
  transition: border-color 0.2s;
}
.currency-select:focus { border-color: var(--purple); }
.currency-field .form-input { border-radius: 0; }
.currency-field .form-input:focus { border-color: var(--purple); }
.eur-color { color: #a8d8c8 !important; }


/* DUPLICATE CLIENT SUGGESTION */
.dup-suggestion {
  margin-top: 6px;
  border: 1px solid rgba(201,168,76,0.35);
  background: rgba(201,168,76,0.07);
  border-radius: 4px;
  overflow: hidden;
}
.dup-suggestion-header {
  padding: 8px 12px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}
.dup-suggestion-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border-top: 1px solid rgba(201,168,76,0.15);
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
}
.dup-suggestion-item:hover { background: rgba(201,168,76,0.1); }
.dup-suggestion-name { font-size: 14px; color: var(--text); font-weight: 500; }
.dup-suggestion-meta { font-size: 12px; color: var(--text-muted); font-style: italic; }
.dup-suggestion-badge {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.4);
  padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
}
.form-input.input-warning { border-color: rgba(201,168,76,0.5) !important; }

/* CONFIRM MODAL */
.confirm-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 380px;
  padding: 0;
}
.confirm-modal-body {
  padding: 28px 28px 20px;
  text-align: center;
}
.confirm-modal-icon { font-size: 32px; margin-bottom: 12px; }
.confirm-modal-title {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 8px;
}
.confirm-modal-desc {
  font-size: 14px;
  color: var(--text-muted);
  font-style: italic;
}
.confirm-modal-footer {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
}
.confirm-modal-footer button {
  flex: 1;
  padding: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.confirm-modal-footer .confirm-cancel {
  background: transparent;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
}
.confirm-modal-footer .confirm-cancel:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.confirm-modal-footer .confirm-ok {
  background: transparent;
  color: var(--crimson);
}
.confirm-modal-footer .confirm-ok:hover { background: rgba(192,64,74,0.12); }

/* USER badge */
.badge-user { background: rgba(155,111,212,0.15); color: var(--purple-light); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; padding: 2px 8px; text-transform: uppercase; }

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0; left: 240px; right: 0;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 90;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
}

.topbar-search {
  flex: 1;
  max-width: 480px;
  position: relative;
}

.topbar-search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}

.topbar-search input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 34px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.topbar-search input:focus { border-color: var(--purple); }
.topbar-search input::placeholder { color: var(--text-dim); }

/* GLOBAL SEARCH RESULTS */
.search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  z-index: 200;
  max-height: 420px;
  overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.search-result-section {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.search-result-section:last-child { border-bottom: none; }

.search-result-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 4px 16px 8px;
}

.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.search-result-item:hover { background: rgba(155,111,212,0.1); }
.search-result-item-main { font-size: 15px; color: var(--text); }
.search-result-item-sub { font-size: 13px; color: var(--text-muted); font-style: italic; }

/* SORTABLE TH */
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--text-muted); }
th.sortable.asc::after  { content: ' ↑'; color: var(--purple-light); }
th.sortable.desc::after { content: ' ↓'; color: var(--purple-light); }

/* CLIENT INACTIVE */
.client-inactive td { opacity: 0.45; }
.badge-inactive { background: rgba(90,78,120,0.2); color: var(--text-dim); font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; padding:2px 8px; text-transform:uppercase; }

/* CLIENT SUMMARY BOX */
.client-summary {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 10px 14px;
  margin-top: 8px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.client-summary-item { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
.client-summary-item span { color: var(--gold); margin-left: 4px; }
.client-summary-debt { color: #e08888 !important; }

.main-with-topbar { padding-top: 84px; }
@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; padding: 16px; }
  .topbar { left: 200px; }
  .cards-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 580px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .topbar { left: 0; }
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>


<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────
const SERVICES = ['Leitura de Tarot', 'Jogo de Búzios', 'Mesa Radiônica'];
const WORK_TYPES = ['Limpeza Energética', 'Amarração', 'Desfazimento', 'Proteção', 'Abertura de Caminhos', 'Limpeza Pesada', 'Trabalho de Justiça', 'Outro'];
const STATUS = ['Pendente', 'Concluído', 'Cancelado'];
const WORK_STATUS = ['Em andamento', 'Concluído', 'Cancelado'];
const COUNTRIES = ['Brasil', 'Portugal', 'Outro país da Europa'];
const USERS = ['Vivian', 'Thais'];
const DEBT_STATUS = ['Aberta', 'Quitada'];
const PAGE_SIZE = 20;

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const ZODIAC = [
  {sign:'Capricórnio', start:[12,22], end:[1,19]},
  {sign:'Aquário',     start:[1,20],  end:[2,18]},
  {sign:'Peixes',      start:[2,19],  end:[3,20]},
  {sign:'Áries',       start:[3,21],  end:[4,19]},
  {sign:'Touro',       start:[4,20],  end:[5,20]},
  {sign:'Gêmeos',      start:[5,21],  end:[6,20]},
  {sign:'Câncer',      start:[6,21],  end:[7,22]},
  {sign:'Leão',        start:[7,23],  end:[8,22]},
  {sign:'Virgem',      start:[8,23],  end:[9,22]},
  {sign:'Libra',       start:[9,23],  end:[10,22]},
  {sign:'Escorpião',   start:[10,23], end:[11,21]},
  {sign:'Sagitário',   start:[11,22], end:[12,21]},
];

// ── UTILS ────────────────────────────────────────────────
function parseMoney(val) {
  if (!val && val !== 0) return 0;
  if (typeof val === 'number') return val;
  return parseFloat(String(val).replace(/[^\d,.-]/g,'').replace(',','.')) || 0;
}

function formatMoney(val) {
  const n = parseMoney(val);
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function formatValue(val, currency) {
  if (!val && val !== 0) return '—';
  const sym = (currency === 'EUR') ? '€' : 'R$';
  return `${sym} ${formatMoney(val)}`;
}

function toEur(val, currency, rate) {
  const v = parseMoney(val);
  if (!v) return 0;
  return currency === 'EUR' ? v : v / Math.max(rate, 0.01);
}

function getRemaining(total, paid) {
  const r = parseMoney(total) - parseMoney(paid);
  return Math.max(0, r);
}

function formatDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function newId() {
  return crypto.randomUUID();
}

function sortByDate(arr, field = 'date', dir = 'desc') {
  return [...arr].sort((a, b) => {
    const da = new Date(a[field] || '1970-01-01');
    const db = new Date(b[field] || '1970-01-01');
    return dir === 'desc' ? db - da : da - db;
  });
}

// Utility: group items by date proximity (today / tomorrow / this week / others)
function getDateGroups(items, dateField = 'date') {
  const todayStr = today();
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomorrowStr = tom.toISOString().slice(0,10);
  const wk = new Date(); wk.setDate(wk.getDate()+7);
  const weekEndStr = wk.toISOString().slice(0,10);
  return [
    { key:'hoje',   label:'Hoje',        color:'var(--gold)',         items: items.filter(i => i[dateField] === todayStr) },
    { key:'amanha', label:'Amanhã',      color:'var(--purple-light)', items: items.filter(i => i[dateField] === tomorrowStr) },
    { key:'semana', label:'Esta Semana', color:'#7ec49a',             items: items.filter(i => i[dateField] > tomorrowStr && i[dateField] <= weekEndStr) },
    { key:'outros', label:'Outros',      color:'var(--text-dim)',     items: items.filter(i => !i[dateField] || (i[dateField] !== todayStr && i[dateField] !== tomorrowStr && (i[dateField] > weekEndStr || i[dateField] < todayStr))) },
  ];
}

function getZodiac(birthdate) {
  if (!birthdate) return null;
  const d = new Date(birthdate);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  for (const z of ZODIAC) {
    const [sm, sd] = z.start;
    const [em, ed] = z.end;
    if (sm > em) {
      if ((m === sm && day >= sd) || (m === em && day <= ed)) return z.sign;
    } else {
      if ((m === sm && day >= sd) || (m > sm && m < em) || (m === em && day <= ed)) return z.sign;
    }
  }
  return null;
}

function clientName(cl, fallback) {
  if (!cl) return fallback || '—';
  return cl.nickname || cl.name;
}

function isOverdue(apt) {
  if (apt.status !== 'Pendente' && apt.status !== 'Confirmado') return false;
  if (!apt.date) return false;
  const aptDate = new Date(`${apt.date}T${apt.time || '23:59'}:00`);
  const diff = (new Date() - aptDate) / (1000 * 60 * 60);
  return diff > 24;
}

// ── STORAGE ──────────────────────────────────────────────
function loadData(key, def) {
  try { const v = localStorage.getItem('agenda_' + key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function saveData(key, val) {
  try { localStorage.setItem('agenda_' + key, JSON.stringify(val)); } catch {}
}

// ── PAGINATION HOOK ──────────────────────────────────────
function usePagination(items, pageSize = PAGE_SIZE, sortKey = '') {
  const [page, setPage] = useState(1);
  // Reset on length change OR when sort order changes
  const itemsLen = items.length;
  useEffect(() => setPage(1), [itemsLen, sortKey]);
  const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
  const paged = items.slice((page - 1) * pageSize, page * pageSize);
  return { paged, page, setPage, totalPages };
}

// ── PAGINATION UI ────────────────────────────────────────
function Pagination({ page, totalPages, setPage, total }) {
  if (totalPages <= 1) return null;
  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== '...') {
      pages.push('...');
    }
  }
  return (
    <div className="pagination">
      <button className="page-btn" onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}>←</button>
      {pages.map((p, i) =>
        p === '...'
          ? <span key={i} className="page-info">···</span>
          : <button key={p} className={`page-btn${page === p ? ' active' : ''}`} onClick={() => setPage(p)}>{p}</button>
      )}
      <button className="page-btn" onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages}>→</button>
      <span className="page-info">{total} registros</span>
    </div>
  );
}

// ── BADGE CLASS ──────────────────────────────────────────
function badgeClass(val) {
  const map = {
    'Leitura de Tarot': 'badge-tarot',
    'Jogo de Búzios': 'badge-buzios',
    'Limpeza Energética': 'badge-limpeza',
    'Mesa Radiônica': 'badge-radionica',
    'Pendente': 'badge-pendente',
    'Concluído': 'badge-concluido',
    'Cancelado': 'badge-cancelado',
    'Em andamento': 'badge-andamento',
  };
  const cls = map[val];
  if (!cls && val) return 'badge badge-trabalho';
  return `badge ${cls || ''}`;
}

// ── CURRENCY FIELD ────────────────────────────────────────
function CurrencyField({ value, currency, onValueChange, onCurrencyChange, placeholder }) {
  return (
    <div className="currency-field">
      <select className="currency-select" value={currency} onChange={e => onCurrencyChange(e.target.value)}>
        <option value="BRL">R$</option>
        <option value="EUR">€</option>
      </select>
      <input
        type="number" min="0" step="0.01"
        className="form-input"
        value={value}
        onChange={e => onValueChange(e.target.value)}
        placeholder={placeholder || '0,00'}
      />
    </div>
  );
}

// ── NOTIFICATION ─────────────────────────────────────────
function Notification({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className="notification">✦ {msg}</div>;
}

// ── MODAL ─────────────────────────────────────────────────
function Modal({ title, onClose, children, footer, wide }) {
  useEffect(() => {
    function handleKey(e) { if (e.key === 'Escape') onClose(); }
    document.addEventListener('keydown', handleKey);
    return () => document.removeEventListener('keydown', handleKey);
  }, []);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={wide ? {maxWidth:720} : {}}>
        <div className="modal-header">
          <h3>{title}</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ── CONFIRM MODAL ────────────────────────────────────────
function ConfirmModal({ title, desc, icon, onConfirm, onCancel }) {
  useEffect(() => {
    function handleKey(e) { if (e.key === 'Escape') onCancel(); }
    document.addEventListener('keydown', handleKey);
    return () => document.removeEventListener('keydown', handleKey);
  }, []);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="confirm-modal">
        <div className="confirm-modal-body">
          {icon && <div className="confirm-modal-icon">{icon}</div>}
          <div className="confirm-modal-title">{title}</div>
          {desc && <div className="confirm-modal-desc">{desc}</div>}
        </div>
        <div className="confirm-modal-footer">
          <button className="confirm-cancel" onClick={onCancel}>Cancelar</button>
          <button className="confirm-ok" onClick={onConfirm}>Confirmar</button>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN ────────────────────────────────────────────────
function Login({ onLogin }) {
  return (
    <div className="login-screen">
      <div className="login-card">
        <h1>Agenda Espiritual</h1>
        <p>Vivi de Mulambo · Quem está acessando?</p>
        <div className="login-users">
          {USERS.map(u => (
            <button key={u} className="login-user-btn" onClick={() => onLogin(u)}>
              <span className="login-user-icon">{u === 'Vivian' ? '🌙' : '✦'}</span>
              <div>
                <div>{u}</div>
                <div className="login-user-sub">clique para entrar</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── LIGHTBOX ─────────────────────────────────────────────
function Lightbox({ src, onClose }) {
  return (
    <div className="lightbox" onClick={onClose}>
      <img src={src} onClick={e => e.stopPropagation()} alt="Foto" />
      <div className="lightbox-controls" onClick={e => e.stopPropagation()}>
        <a href={src} download="foto_cliente.jpg">
          <button className="btn btn-ghost">⬇ Download</button>
        </a>
        <button className="btn btn-ghost" onClick={onClose}>✕ Fechar</button>
      </div>
    </div>
  );
}

// ── DASHBOARD TABS ITEMS (outside to avoid re-creation on each render) ──────
function AptItem({ a, clients, onClientClick }) {
  const cl = clients.find(c => c.id === a.clientId);
  const overdueApt = isOverdue(a);
  return (
    <div className="agenda-item" style={{margin:0,border:'none',borderBottom:'1px solid var(--border)'}}>
      <div className="agenda-time">{a.time || '—'}</div>
      <div className="agenda-info" style={{flex:1}}>
        <h4
          style={{cursor: cl ? 'pointer' : 'default', borderBottom: cl ? '1px dotted var(--purple-light)' : 'none', display:'inline'}}
          onClick={() => cl && onClientClick && onClientClick(cl.id)}
        >{cl ? clientName(cl) : a.clientName || '—'}</h4>
        <p>{a.service} · {formatDate(a.date)}</p>
        {a.notes && <div className="agenda-obs">{a.notes}</div>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end',marginLeft:'auto'}}>
        {a.value && <span style={{fontFamily:'DM Mono,monospace',fontSize:12,color:a.currency==='EUR'?'#a8d8c8':'var(--gold)'}}>{formatValue(a.value,a.currency)}</span>}
        {overdueApt && <span className="badge badge-atrasado">Atrasado</span>}
      </div>
    </div>
  );
}

function WrkItem({ w, clients, onClientClick }) {
  const cl = clients.find(c => c.id === w.clientId);
  return (
    <div className="agenda-item" style={{margin:0,border:'none',borderBottom:'1px solid var(--border)'}}>
      <div className="agenda-time">{w.time || '—'}</div>
      <div className="agenda-info" style={{flex:1}}>
        <h4
          style={{cursor: cl ? 'pointer' : 'default', borderBottom: cl ? '1px dotted #e08888' : 'none', display:'inline'}}
          onClick={() => cl && onClientClick && onClientClick(cl.id)}
        >{cl ? clientName(cl) : w.clientName || '—'}</h4>
        <p>{w.type} · {formatDate(w.startDate)}</p>
        {w.description && <div className="agenda-obs">{w.description}</div>}
      </div>
      {w.value && <span style={{fontFamily:'DM Mono,monospace',fontSize:12,color:w.currency==='EUR'?'#a8d8c8':'var(--gold)',marginLeft:'auto',alignSelf:'center'}}>{formatValue(w.value,w.currency)}</span>}
    </div>
  );
}

// ── DASHBOARD TABS ───────────────────────────────────────
function DashboardTabs({ appointments, works, clients, onClientClick }) {
  const [activeTab, setActiveTab] = useState('apt-pendente');
  const today_str = today();

  const tabs = [
    { id:'apt-pendente',  label:'Atend. Pendentes',  color:'var(--gold)',         icon:'◷' },
    { id:'apt-concluido', label:'Atend. Concluídos', color:'#7ec49a',             icon:'◷' },
    { id:'wrk-andamento', label:'Trab. Andamento',   color:'#e08888',             icon:'🕯' },
    { id:'wrk-concluido', label:'Trab. Concluídos',  color:'var(--purple-light)', icon:'🕯' },
  ];

  const aptPendentes  = sortByDate(appointments.filter(a => a.status === 'Pendente'), 'date', 'asc');
  const aptConcluidos = sortByDate(appointments.filter(a => a.status === 'Concluído'), 'date', 'desc');
  const wrkAndamento  = sortByDate(works.filter(w => w.status === 'Em andamento'), 'startDate', 'asc');
  const wrkConcluidos = sortByDate(works.filter(w => w.status === 'Concluído'), 'startDate', 'desc');

  const counts = {
    'apt-pendente': aptPendentes.length,
    'apt-concluido': aptConcluidos.length,
    'wrk-andamento': wrkAndamento.length,
    'wrk-concluido': wrkConcluidos.length,
  };

  const activeColor = tabs.find(t => t.id === activeTab)?.color || 'var(--purple)';

  return (
    <div className="table-container">
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'12px 14px',
            background:'none', border:'none',
            borderBottom: activeTab===t.id ? `2px solid ${t.color}` : '2px solid transparent',
            color: activeTab===t.id ? t.color : 'var(--text-dim)',
            cursor:'pointer', transition:'all 0.2s',
            fontFamily:'DM Mono,monospace', fontSize:9, letterSpacing:'0.1em', textTransform:'uppercase',
            marginBottom:'-1px', whiteSpace:'nowrap', flex:'1', justifyContent:'center'
          }}>
            <span>{t.icon}</span>
            <span>{t.label}</span>
            <span style={{
              background: activeTab===t.id ? t.color : 'var(--surface2)',
              color: activeTab===t.id ? 'var(--bg)' : 'var(--text-dim)',
              borderRadius:'10px', padding:'1px 6px', fontSize:9
            }}>{counts[t.id]}</span>
          </button>
        ))}
      </div>

      {activeTab === 'apt-pendente' && (
        aptPendentes.length === 0
          ? <div className="empty-state"><div className="empty-icon">🌙</div><p>Nenhum atendimento pendente</p></div>
          : aptPendentes.map(a => <AptItem key={a.id} a={a} clients={clients} onClientClick={onClientClick} />)
      )}
      {activeTab === 'apt-concluido' && (
        aptConcluidos.length === 0
          ? <div className="empty-state"><div className="empty-icon">✦</div><p>Nenhum atendimento concluído</p></div>
          : aptConcluidos.map(a => <AptItem key={a.id} a={a} clients={clients} onClientClick={onClientClick} />)
      )}
      {activeTab === 'wrk-andamento' && (
        wrkAndamento.length === 0
          ? <div className="empty-state"><div className="empty-icon">🕯️</div><p>Nenhum trabalho em andamento</p></div>
          : wrkAndamento.map(w => <WrkItem key={w.id} w={w} clients={clients} onClientClick={onClientClick} />)
      )}
      {activeTab === 'wrk-concluido' && (
        wrkConcluidos.length === 0
          ? <div className="empty-state"><div className="empty-icon">✦</div><p>Nenhum trabalho concluído</p></div>
          : wrkConcluidos.map(w => <WrkItem key={w.id} w={w} clients={clients} onClientClick={onClientClick} />)
      )}
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────
function Dashboard({ clients, appointments, works, debts, currentUser, onNavigate }) {
  const [detailClient, setDetailClient] = useState(null);

  function openClientDetail(clientId) {
    const cl = clients.find(c => c.id === clientId);
    if (cl) setDetailClient(cl);
  }

  const today_str = today();
  const thisMonth = new Date().toISOString().slice(0, 7);
  const todayApts = appointments.filter(a => a.date === today_str && a.status !== 'Cancelado');
  const monthApts = appointments.filter(a => a.date && a.date.startsWith(thisMonth) && a.status !== 'Cancelado');
  const concluded = appointments.filter(a => a.status === 'Concluído').length;
  const recorrentes = clients.filter(c => appointments.filter(a => a.clientId === c.id).length > 1).length;
  const openDebts = (debts||[]).filter(d => d.status !== 'Quitada');
  const openDebtTotal = openDebts.reduce((s, d) => s + parseMoney(getRemaining(d.total, d.paid)), 0);

  const overdue = appointments.filter(isOverdue);

  // Próximo atendimento futuro pendente
  const nextApt = sortByDate(
    appointments.filter(a => a.date >= today_str && a.status === 'Pendente'), 'date', 'asc'
  )[0];
  const nextAptClient = nextApt ? clients.find(c => c.id === nextApt.clientId) : null;

  const byService = SERVICES.map(s => ({
    name: s,
    count: appointments.filter(a => a.service === s && a.status !== 'Cancelado').length
  })).filter(s => s.count > 0).sort((a, b) => b.count - a.count);

  const byWorkType = WORK_TYPES.map(t => ({
    name: t,
    count: works.filter(w => w.type === t && w.status !== 'Cancelado').length
  })).filter(w => w.count > 0).sort((a, b) => b.count - a.count);

  const hora = new Date().getHours();
  const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

  const clientApts = detailClient ? sortByDate(appointments.filter(a => a.clientId === detailClient.id), 'date', 'desc') : [];
  const clientWrks = detailClient ? sortByDate(works.filter(w => w.clientId === detailClient.id), 'startDate', 'desc') : [];
  const clientDebts = detailClient ? sortByDate((debts||[]).filter(d => d.clientId === detailClient.id && d.status !== 'Quitada'), 'dueDate', 'desc') : [];

  return (
    <div>
      {detailClient && (
        <Modal title="Ficha do Cliente" onClose={() => setDetailClient(null)} wide>
          <div className="detail-grid">
            <div><div className="detail-item-label">Nome</div><div className="detail-item-value">{detailClient.name}</div></div>
            <div><div className="detail-item-label">Telefone</div><div className="detail-item-value">{detailClient.phone || '—'}</div></div>
            <div><div className="detail-item-label">País</div><div className="detail-item-value">{detailClient.country || '—'}</div></div>
            <div><div className="detail-item-label">Nascimento</div><div className="detail-item-value">{formatDate(detailClient.birthdate)}</div></div>
            <div><div className="detail-item-label">Signo</div><div className="detail-item-value">{getZodiac(detailClient.birthdate) || '—'}</div></div>
            <div style={{gridColumn:'1/-1'}}><div className="detail-item-label">Observações</div><div className="detail-item-value" style={{fontStyle:'italic',color:'var(--text-muted)'}}>{detailClient.notes || '—'}</div></div>
          </div>
          {(detailClient.photos||[]).length > 0 && (
            <>
              <div className="divider-line"/>
              <div style={{marginBottom:12,fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--text-dim)'}}>Fotos</div>
              <div className="photo-grid">
                {detailClient.photos.map((src, i) => (
                  <img key={i} src={src} className="photo-thumb" alt="" />
                ))}
              </div>
            </>
          )}
          <div className="divider-line"/>
          <ClientHistoryTabs clientApts={clientApts} clientWrks={clientWrks} clientDebts={clientDebts} />
        </Modal>
      )}

      <div className="page-header">
        <h2>Visão Geral</h2>
        <p>{saudacao}, <strong style={{color:'var(--purple-light)'}}>{currentUser}</strong> ✦</p>
      </div>

      {overdue.length > 0 && (
        <div className="alert-banner">
          <div className="alert-banner-icon">⚠️</div>
          <div className="alert-banner-content">
            <h4>Leituras com atraso (&gt;24h)</h4>
            <p>
              {overdue.map((a, i) => {
                const cl = clients.find(c => c.id === a.clientId);
                return (i > 0 ? ' · ' : '') + (cl ? clientName(cl) : a.clientName || '?') + ' — ' + a.service;
              })}
            </p>
          </div>
        </div>
      )}

      {/* cards topo — 5 cards em linha */}
      <div className="cards-grid" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
        <div className="stat-card gold">
          <div className="stat-label">Hoje</div>
          <div className="stat-value">{todayApts.length}</div>
          <div className="stat-sub">atendimento{todayApts.length !== 1 ? 's' : ''}</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">Este mês</div>
          <div className="stat-value">{monthApts.length}</div>
          <div className="stat-sub">agendamentos</div>
        </div>
        <div className="stat-card sage">
          <div className="stat-label">Clientes</div>
          <div className="stat-value">{clients.filter(c=>!c.inactive).length}</div>
          <div className="stat-sub">{recorrentes} recorrentes</div>
        </div>
        <div className="stat-card crimson">
          <div className="stat-label">Concluídos</div>
          <div className="stat-value">{concluded}</div>
          <div className="stat-sub">atendimentos</div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid #e08888'}}>
          <div className="stat-label" style={{color:'#e08888'}}>Dívidas em aberto</div>
          <div className="stat-value" style={{fontSize:openDebtTotal>0?18:28,color:openDebtTotal>0?'#e08888':'var(--text-dim)'}}>
            {openDebts.length > 0 ? `R$ ${formatMoney(openDebtTotal)}` : '—'}
          </div>
          <div className="stat-sub">{openDebts.length} dívida{openDebts.length !== 1 ? 's' : ''}</div>
        </div>
      </div>

      {/* próximo atendimento destaque */}
      {nextApt && (
        <div style={{
          background:'linear-gradient(135deg, rgba(155,111,212,0.12), rgba(201,168,76,0.08))',
          border:'1px solid rgba(155,111,212,0.3)',
          padding:'14px 20px', marginBottom:16,
          display:'flex', alignItems:'center', gap:16
        }}>
          <div style={{fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--purple-light)',minWidth:110}}>
            Próximo Atend.
          </div>
          <div style={{flex:1}}>
            <span
              style={{fontSize:16,color:'var(--text)',cursor:'pointer',borderBottom:'1px dotted var(--purple-light)'}}
              onClick={() => nextAptClient && openClientDetail(nextAptClient.id)}
            >
              {nextAptClient ? clientName(nextAptClient) : nextApt.clientName || '—'}
            </span>
            <span style={{fontSize:14,color:'var(--text-muted)',marginLeft:12}}>{nextApt.service}</span>
          </div>
          <div style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--gold)'}}>
            {formatDate(nextApt.date)} {nextApt.time && `às ${nextApt.time}`}
          </div>
        </div>
      )}

      {/* abas — largura total */}
      <DashboardTabs appointments={appointments} works={works} clients={clients} onClientClick={openClientDetail} />

      {/* mais solicitados — abaixo, em duas colunas */}
      <div className="table-container" style={{marginTop:16}}>
        <div className="table-header"><span className="table-title">Mais Solicitados</span></div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:0}}>
          <div style={{padding:'16px 24px', borderRight:'1px solid var(--border)'}}>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:9,letterSpacing:'0.2em',color:'var(--purple-light)',textTransform:'uppercase',marginBottom:12}}>◷ Atendimentos</div>
            {byService.length === 0
              ? <p style={{color:'var(--text-dim)',fontStyle:'italic',fontSize:14}}>Sem dados</p>
              : byService.map(s => (
                <div key={s.name} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:15,color:'var(--text)'}}>{s.name}</span>
                    <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'var(--gold)'}}>{s.count}</span>
                  </div>
                  <div style={{height:3,background:'var(--border)'}}>
                    <div style={{height:'100%',width:`${(s.count/byService[0].count)*100}%`,background:'var(--purple)',transition:'width 0.5s'}}/>
                  </div>

              ))
            }
          </div>
          <div style={{padding:'16px 24px'}}>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:9,letterSpacing:'0.2em',color:'#e08888',textTransform:'uppercase',marginBottom:12}}>🕯 Trabalhos</div>
            {byWorkType.length === 0
              ? <p style={{color:'var(--text-dim)',fontStyle:'italic',fontSize:14}}>Sem dados</p>
              : byWorkType.map(w => (
                <div key={w.name} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:15,color:'var(--text)'}}>{w.name}</span>
                    <span style={{fontFamily:'DM Mono,monospace',fontSize:13,color:'#e08888'}}>{w.count}</span>
                  </div>
                  <div style={{height:3,background:'var(--border)'}}>
                    <div style={{height:'100%',width:`${(w.count/byWorkType[0].count)*100}%`,background:'#e08888',transition:'width 0.5s'}}/>

          </div>

// ── CLIENTS ──────────────────────────────────────────────
function Clients({ clients, setClients, appointments, works, debts, notify, currentUser }) {
  const [search, setSearch] = useState('');
  const [clientTab, setClientTab] = useState('ativos');
  const [showModal, setShowModal] = useState(false);
  const [showDetail, setShowDetail] = useState(null);
  const [editing, setEditing] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [form, setForm] = useState({ name:'', nickname:'', phone:'', country:'Brasil', birthdate:'', notes:'', photos:[] });
  const [confirmDel, setConfirmDel] = useState(null);
  const [dupWarning, setDupWarning] = useState(false);
  const fileRef = useRef();

  const activeClients   = clients.filter(c => !c.inactive);
  const inactiveClients = clients.filter(c => !!c.inactive);
  const baseList = clientTab === 'ativos' ? activeClients : inactiveClients;

  const filtered = baseList.filter(c =>
    c.name.toLowerCase().includes(search.toLowerCase()) ||
    (c.nickname && c.nickname.toLowerCase().includes(search.toLowerCase())) ||
    (c.phone && c.phone.includes(search))
  );

  function getLastActivity(clientId) {
    const apts = appointments.filter(a => a.clientId === clientId && a.status !== 'Cancelado');
    const wrks = works.filter(w => w.clientId === clientId && w.status !== 'Cancelado');
    const dates = [...apts.map(a => a.date), ...wrks.map(w => w.startDate)].filter(Boolean).sort().reverse();
    return dates[0] || null;
  }

  function openNew() {
    setEditing(null);
    setDupWarning(false);
    setForm({ name:'', nickname:'', phone:'', country:'Brasil', birthdate:'', notes:'', photos:[] });
    setShowModal(true);
  }

  function openEdit(c) {
    setEditing(c.id);
    setForm({ name:c.name, nickname:c.nickname||'', phone:c.phone||'', country:c.country||'Brasil', birthdate:c.birthdate||'', notes:c.notes||'', photos:c.photos||[] });
    setShowModal(true);
  }

  function handlePhotoUpload(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        setForm(f => ({ ...f, photos: [...(f.photos||[]), ev.target.result].slice(0, 3) }));
      };
      reader.readAsDataURL(file);
    });
  }

  function removePhoto(idx) {
    setForm(f => ({ ...f, photos: f.photos.filter((_, i) => i !== idx) }));
  }

  function save(force = false) {
    if (!form.name.trim()) return;
    if (editing) {
      const updated = clients.map(c => c.id === editing ? { ...c, ...form } : c);
      setClients(updated); saveData('clients', updated); notify('Cliente atualizado');
      setShowModal(false);
    } else {
      // Check for duplicate name (or nickname) ignoring case
      if (!force) {
        const nameLow = form.name.trim().toLowerCase();
        const nickLow = form.nickname.trim().toLowerCase();
        const isDup = clients.some(c => {
          const cName = c.name.toLowerCase();
          const cNick = (c.nickname || '').toLowerCase();
          return cName === nameLow || (nickLow && nickLow.length > 2 && cNick === nickLow);
        });
        if (isDup) { setDupWarning(true); return; }
      }
      setDupWarning(false);
      const newC = { id: newId(), createdAt: today(), ...form };
      const updated = [...clients, newC];
      setClients(updated); saveData('clients', updated); notify('Cliente cadastrado');
      setShowModal(false);
    }
  }

  function deleteClient(id) {
    setConfirmDel({ id, type: 'client' });
  }
  function confirmDeleteClient() {
    const updated = clients.filter(c => c.id !== confirmDel.id);
    setClients(updated); saveData('clients', updated); notify('Cliente removido');
    setConfirmDel(null);
  }

  function toggleInactive(id) {
    const updated = clients.map(c => c.id === id ? { ...c, inactive: !c.inactive } : c);
    setClients(updated); saveData('clients', updated);
    const cl = clients.find(c => c.id === id);
    notify(cl.inactive ? 'Cliente reativado' : 'Cliente marcado como inativo');
  }

  function copyClient(c) {
    const txt = `${c.name}${c.phone ? '\n' + c.phone : ''}`;
    navigator.clipboard.writeText(txt).then(() => notify('Dados copiados!'));
  }

  const clientApts  = showDetail ? sortByDate(appointments.filter(a => a.clientId === showDetail.id), 'date', 'desc') : [];
  const clientWrks  = showDetail ? sortByDate(works.filter(w => w.clientId === showDetail.id), 'startDate', 'desc') : [];
  const clientDebts = showDetail ? sortByDate((debts||[]).filter(d => d.clientId === showDetail.id && d.status !== 'Quitada'), 'dueDate', 'desc') : [];

  const { sorted: sortedClients, thProps, sortKey: clientSortKey } = useSortable(filtered, 'name');
  const { paged, page, setPage, totalPages } = usePagination(sortedClients, PAGE_SIZE, clientSortKey);

  return (
    <div>
      {lightbox && <Lightbox src={lightbox} onClose={() => setLightbox(null)} />}
      {confirmDel && (
        <ConfirmModal
          icon="✕" title="Remover cliente?"
          desc="Esta ação não poderá ser desfeita."
          onConfirm={confirmDeleteClient}
          onCancel={() => setConfirmDel(null)}
        />
      )}

      <div className="page-header">
        <h2>Clientes</h2>
        <p>{activeClients.length} ativos · {inactiveClients.length} inativos</p>
      </div>

      <div className="table-container">
        <div className="table-header">
          <div style={{display:'flex',gap:0,borderBottom:'none'}}>
            {[{id:'ativos',label:`Ativos (${activeClients.length})`},{id:'inativos',label:`Inativos (${inactiveClients.length})`}].map(t => (
              <button key={t.id} onClick={() => { setClientTab(t.id); setSearch(''); }} style={{
                background:'none', border:'none', borderBottom: clientTab===t.id ? '2px solid var(--purple-light)' : '2px solid transparent',
                color: clientTab===t.id ? 'var(--purple-light)' : 'var(--text-dim)',
                fontFamily:'DM Mono,monospace', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase',
                padding:'6px 16px', cursor:'pointer', transition:'all 0.2s'
              }}>{t.label}</button>
            ))}
          </div>
          <button className="btn btn-primary" onClick={openNew}>+ Novo Cliente</button>
        </div>
        <div className="search-bar">
          <input className="search-input" placeholder="Buscar por nome, apelido ou telefone..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>

        {paged.length === 0
          ? <div className="empty-state"><div className="empty-icon">✦</div><p>Nenhum cliente encontrado</p></div>
          : <>
            <table>
              <thead><tr>
                <th {...thProps('name')}>Nome</th>
                <th>Telefone</th>
                <th {...thProps('country')}>País</th>
                <th>Signo</th>
                <th>Atend.</th>
                <th>Última Ativ.</th>
                <th>Obs.</th>
                <th {...thProps('createdAt')}>Cadastro</th>
                <th></th>
              </tr></thead>
              <tbody>
                {paged.map(c => {
                  const count = appointments.filter(a => a.clientId === c.id).length;
                  const zodiac = getZodiac(c.birthdate);
                  const lastAct = getLastActivity(c.id);
                  const openDebts = (debts||[]).filter(d => d.clientId === c.id && d.status !== 'Quitada');
                  const hasDebt = openDebts.length > 0;
                  const debtTotal = openDebts.reduce((s, d) => s + parseMoney(getRemaining(d.total, d.paid)), 0);
                  const today_ = today();
                  const isRecent = lastAct && lastAct >= today_.slice(0,7); // this month
                  return (
                    <tr key={c.id} className={c.inactive ? 'client-inactive' : ''}>
                      <td style={{cursor:'pointer'}} onClick={() => setShowDetail(c)}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span style={{borderBottom:'1px dotted var(--purple-light)'}}>{c.nickname || c.name}</span>
                          {c.inactive && <span className="badge-inactive">inativo</span>}
                        </div>
                      </td>
                      <td>
                        {c.phone
                          ? <a href={`https://wa.me/${c.phone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" style={{color:'#7ec49a',textDecoration:'none'}} title="Abrir WhatsApp">📱 {c.phone}</a>
                          : '—'}
                      </td>
                      <td>{c.country || '—'}</td>
                      <td style={{fontSize:14,color:'var(--text-muted)'}}>{zodiac || '—'}</td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontFamily:'DM Mono,monospace',fontSize:14,color:count > 1 ? 'var(--gold)' : 'var(--text-muted)'}}>
                            {count} {count > 1 ? '⭐' : ''}
                          </span>
                          {hasDebt && (
                            <span title={`Dívida: R$ ${formatMoney(debtTotal)}`} style={{
                              fontSize:10, fontFamily:'DM Mono,monospace',
                              background:'rgba(224,136,136,0.15)', color:'#e08888',
                              border:'1px solid rgba(224,136,136,0.3)',
                              padding:'1px 6px', letterSpacing:'0.05em'
                            }}>
                              ◉ dívida
                            </span>
                          )}
                        </div>
                      </td>
                      <td style={{fontFamily:'DM Mono,monospace',fontSize:13,color: isRecent ? '#7ec49a' : 'var(--text-muted)'}}>
                        {lastAct ? formatDate(lastAct) : <span style={{color:'var(--text-dim)'}}>—</span>}
                      </td>
                      <td style={{maxWidth:160}}>
                        {c.notes
                          ? <div style={{fontSize:13,color:'var(--text-muted)',fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}} title={c.notes}>{c.notes}</div>
                          : <span style={{color:'var(--text-dim)'}}>—</span>
                        }
                      </td>
                      <td style={{fontFamily:'DM Mono,monospace',fontSize:13}}>{formatDate(c.createdAt)}</td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-ghost btn-sm" title="Copiar nome e telefone" onClick={() => copyClient(c)}>⎘</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => openEdit(c)}>Editar</button>
                          <button className="btn btn-ghost btn-sm" title={c.inactive ? 'Reativar' : 'Marcar inativo'} onClick={() => toggleInactive(c.id)} style={{color: c.inactive ? '#7ec49a' : 'var(--text-dim)'}}>
                            {c.inactive ? '✓' : '○'}
                          </button>
                          <button className="btn btn-danger" onClick={() => deleteClient(c.id)}>✕</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <Pagination page={page} totalPages={totalPages} setPage={setPage} total={filtered.length} />
          </>
        }
      </div>

      {showModal && (
        <Modal
          title={editing ? 'Editar Cliente' : 'Novo Cliente'}
          onClose={() => { setShowModal(false); setDupWarning(false); }}
          footer={<>
            <button className="btn btn-ghost" onClick={() => { setShowModal(false); setDupWarning(false); }}>Cancelar</button>
            <button className="btn btn-primary" onClick={() => save()}>Salvar</button>
          </>}
        >
          {(() => {
            const q = (form.name || '').trim().toLowerCase();
            const liveMatches = q.length >= 2 && !editing
              ? clients.filter(c => {
                  const n = c.name.toLowerCase();
                  const k = (c.nickname || '').toLowerCase();
                  return n.includes(q) || k.includes(q) || q.includes(n) || (k && q.includes(k));
                }).slice(0, 4)
              : [];
            return (
              <div className="form-group">
                <label className="form-label">Nome Completo *</label>
                <input
                  className={"form-input" + (liveMatches.length ? " input-warning" : "")}
                  value={form.name}
                  onChange={e => { setForm({...form, name:e.target.value}); setDupWarning(false); }}
                  placeholder="Nome da cliente"
                />
                {liveMatches.length > 0 && (
                  <div className="dup-suggestion">
                    <div className="dup-suggestion-header">Clientes com nome parecido</div>
                    {liveMatches.map(c => (
                      <div key={c.id} className="dup-suggestion-item" onClick={() => { setShowModal(false); setDupWarning(false); setShowDetail(c); }}>
                        <div>
                          <div className="dup-suggestion-name">{c.nickname || c.name}</div>
                          {c.nickname && <div className="dup-suggestion-meta">{c.name}</div>}
                          {c.phone && <div className="dup-suggestion-meta">{c.phone}</div>}
                        </div>
                        <span className="dup-suggestion-badge">ver ficha</span>
                      </div>
                    ))}
                  </div>
                )}
                {dupWarning && (
                  <div style={{marginTop:6,background:'rgba(192,64,74,0.1)',border:'1px solid rgba(192,64,74,0.4)',padding:'9px 14px',fontSize:13,color:'#e07080',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                    <span>Nome exato já cadastrado. Confirma assim mesmo?</span>
                    <button className="btn btn-ghost btn-sm" onClick={() => save(true)} style={{whiteSpace:'nowrap',color:'#e07080'}}>Confirmar</button>
                  </div>
                )}
              </div>
            );
          })()}
          <div className="form-group">
            <label className="form-label">Apelido / Nome Espiritual</label>
            <input className="form-input" value={form.nickname} onChange={e => { setForm({...form, nickname:e.target.value}); setDupWarning(false); }} placeholder="Como prefere ser chamada, nome espiritual..." />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Telefone / WhatsApp</label>
              <input className="form-input" value={form.phone} onChange={e => setForm({...form, phone:e.target.value})} placeholder="+55 11 99999-9999" />
            </div>
            <div className="form-group">
              <label className="form-label">País</label>
              <select className="form-input" value={form.country} onChange={e => setForm({...form, country:e.target.value})}>
                {COUNTRIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Data de Nascimento</label>
            <input type="date" className="form-input" value={form.birthdate} onChange={e => setForm({...form, birthdate:e.target.value})} />
            {form.birthdate && <div style={{marginTop:6,fontSize:13,color:'var(--text-dim)',fontStyle:'italic'}}>Signo: {getZodiac(form.birthdate) || '—'}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Fotos (máx. 3)</label>
            <div className="photo-grid">
              {(form.photos||[]).map((src, i) => (
                <div key={i} style={{position:'relative'}}>
                  <img src={src} className="photo-thumb" onClick={() => setLightbox(src)} alt="" />
                  <button onClick={() => removePhoto(i)} style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,0.7)',border:'none',color:'white',cursor:'pointer',fontSize:12,padding:'2px 5px'}}>✕</button>
                </div>
              ))}
              {(form.photos||[]).length < 3 && (
                <div className="photo-upload-btn" onClick={() => fileRef.current.click()}>
                  <span>+</span>
                  <span className="photo-upload-label">Foto</span>
                </div>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhotoUpload} />
          </div>
          <div className="form-group">
            <label className="form-label">Observações</label>
            <textarea className="form-input" value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} placeholder="Situação, histórico, detalhes importantes..." />
          </div>
        </Modal>
      )}

      {showDetail && (
        <Modal title="Ficha do Cliente" onClose={() => setShowDetail(null)} wide>
          <div className="detail-grid">
            <div>
              <div className="detail-item-label">Nome</div>
              <div className="detail-item-value">
                {showDetail.name}
                {showDetail.nickname && <span style={{marginLeft:8,fontSize:14,color:'var(--text-dim)',fontStyle:'italic'}}>({showDetail.nickname})</span>}
              </div>
            </div>
            <div><div className="detail-item-label">Telefone</div>
              <div className="detail-item-value">
                {showDetail.phone
                  ? <a href={`https://wa.me/${showDetail.phone.replace(/\D/g,'')}`} target="_blank" rel="noreferrer" style={{color:'#7ec49a',textDecoration:'none'}}>📱 {showDetail.phone}</a>
                  : '—'}
              </div>
            </div>
            <div><div className="detail-item-label">País</div><div className="detail-item-value">{showDetail.country || '—'}</div></div>
            <div><div className="detail-item-label">Nascimento</div><div className="detail-item-value">{formatDate(showDetail.birthdate)}</div></div>
            <div><div className="detail-item-label">Signo</div><div className="detail-item-value">{getZodiac(showDetail.birthdate) || '—'}</div></div>
            <div style={{gridColumn:'1/-1'}}><div className="detail-item-label">Observações</div><div className="detail-item-value" style={{fontStyle:'italic',color:'var(--text-muted)'}}>{showDetail.notes || '—'}</div></div>
          </div>

          {(showDetail.photos||[]).length > 0 && (
            <>
              <div className="divider-line"/>
              <div style={{marginBottom:12,fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--text-dim)'}}>Fotos</div>
              <div className="photo-grid">
                {showDetail.photos.map((src, i) => (
                  <img key={i} src={src} className="photo-thumb" onClick={() => setLightbox(src)} alt="" />
                ))}
              </div>
            </>
          )}

          <div className="divider-line"/>
          <ClientHistoryTabs clientApts={clientApts} clientWrks={clientWrks} clientDebts={clientDebts} />
        </Modal>
      )}

    </div>
  );
}

// ── APPOINTMENTS ─────────────────────────────────────────
function Appointments({ clients, appointments, setAppointments, debts, setDebts, notify, currentUser }) {
  const [view, setView] = useState('lista');
  const [search, setSearch] = useState('');
  const [filterService, setFilterService] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterFrom, setFilterFrom] = useState('');
  const [filterTo, setFilterTo] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showDetail, setShowDetail] = useState(null);
  const [savedConfirmQueue, setSavedConfirmQueue] = useState([]);
  const [confirmDel, setConfirmDel] = useState(null);
  // Show queue items one at a time, auto-dismiss after 5s
  useEffect(() => {
    if (savedConfirmQueue.length === 0) return;
    const t = setTimeout(() => setSavedConfirmQueue(q => q.slice(1)), 5000);
    return () => clearTimeout(t);
  }, [savedConfirmQueue]);
  const savedConfirm = savedConfirmQueue[0] || null;
  const [form, setForm] = useState({ clientId:'', clientName:'', date:today(), time:'', service:SERVICES[0], status:'Pendente', value:'', currency:'BRL', notes:'', pagamento:'na_hora', valorPago:'', vencimento:'' });

  const filtered = appointments.filter(a => {
    const cl = clients.find(c => c.id === a.clientId);
    const name = cl ? cl.name : a.clientName || '';
    const matchSearch = name.toLowerCase().includes(search.toLowerCase()) || a.service.toLowerCase().includes(search.toLowerCase());
    const matchService = !filterService || a.service === filterService;
    const matchStatus = !filterStatus || a.status === filterStatus;
    const matchFrom = !filterFrom || (a.date && a.date >= filterFrom);
    const matchTo = !filterTo || (a.date && a.date <= filterTo);
    return matchSearch && matchService && matchStatus && matchFrom && matchTo;
  });

  const { sorted, thProps: aptThProps, sortKey: aptSortKey } = useSortable(filtered, 'date', 'desc');
  const { paged, page, setPage, totalPages } = usePagination(sorted, PAGE_SIZE, aptSortKey);

  const agendaDates = [...new Set(sorted.map(a => a.date))].sort((a,b) => new Date(a) - new Date(b));

  function openNew() {
    setEditing(null);
    setForm({ clientId:'', clientName:'', date:today(), time:'', service:SERVICES[0], status:'Pendente', value:'', currency:'BRL', notes:'', pagamento:'na_hora', valorPago:'', vencimento:'' });
    setShowModal(true);
  }

  function openEdit(a) {
    setEditing(a.id);
    setForm({ clientId:a.clientId||'', clientName:a.clientName||'', date:a.date||today(), time:a.time||'', service:a.service||SERVICES[0], status:a.status||'Pendente', value:a.value||'', currency:a.currency||'BRL', notes:a.notes||'', pagamento:a.pagamento||'na_hora', valorPago:a.valorPago||'', vencimento:a.vencimento||'' });
    setShowModal(true);
  }

  function save() {
    if (!form.date || !form.service) return;
    const cl = clients.find(c => c.id === form.clientId);
    const entry = { ...form, clientName: cl ? clientName(cl) : form.clientName, createdBy: currentUser };
    const aptId = editing || newId();

    if (editing) {
      const updated = appointments.map(a => a.id === editing ? { ...a, ...entry } : a);
      setAppointments(updated); saveData('appointments', updated); notify('Atendimento atualizado');
    } else {
      const updated = [...appointments, { id: aptId, ...entry }];
      setAppointments(updated); saveData('appointments', updated);

      const total = parseMoney(form.value);
      const pago = parseMoney(form.valorPago);
      const restante = form.pagamento === 'depois' ? total : (form.pagamento === 'parcial' ? total - pago : 0);

      if (restante > 0 && total > 0) {
        const debtClientName = cl ? clientName(cl) : form.clientName;
        const newDebt = {
          id: newId(), clientId: form.clientId || '', clientName: debtClientName,
          description: `${form.service} — agendamento de ${formatDate(form.date)}`,
          total: String(total), paid: String(form.pagamento === 'parcial' ? pago : 0),
          currency: form.currency, dueDate: form.vencimento || '',
          status: form.pagamento === 'parcial' ? 'Parcial' : 'Aberta', createdAt: today(),
          sourceId: aptId, sourceType: 'appointment',
        };
        const updatedDebts = [...(debts||[]), newDebt];
        setDebts(updatedDebts); saveData('debts', updatedDebts);
        notify('Agendamento salvo · Dívida criada automaticamente ✦');
      } else {
        notify('Atendimento agendado');
      }

      setSavedConfirmQueue(q => [...q, {
        clientName: cl ? cl.name : form.clientName || '—',
        service: form.service, date: form.date, time: form.time,
        value: form.value, currency: form.currency, pagamento: form.pagamento,
        hasDebt: restante > 0 && total > 0,
        key: newId(),
      }]);
    }
    setShowModal(false);
  }

  function deleteApt(id) {
    setConfirmDel(id);
  }
  function confirmDeleteApt() {
    const updated = appointments.filter(a => a.id !== confirmDel);
    setAppointments(updated); saveData('appointments', updated); notify('Agendamento removido');
    setConfirmDel(null);
  }

  function duplicateApt(a) {
    setEditing(null);
    setForm({ clientId:a.clientId||'', clientName:a.clientName||'', date:today(), time:a.time||'', service:a.service||SERVICES[0], status:'Pendente', value:a.value||'', currency:a.currency||'BRL', notes:a.notes||'', pagamento:'na_hora', valorPago:'', vencimento:'' });
    setShowModal(true);
  }

  function quickStatus(id, status) {
    const updated = appointments.map(a => a.id === id ? { ...a, status } : a);
    setAppointments(updated); saveData('appointments', updated);
  }

  // Groups via shared utility getDateGroups(items, 'date')

  return (
    <div>
      {confirmDel && (
        <ConfirmModal
          icon="🌙" title="Remover agendamento?"
          desc="Esta ação não poderá ser desfeita."
          onConfirm={confirmDeleteApt}
          onCancel={() => setConfirmDel(null)}
        />
      )}
      <div className="page-header">
        <h2>Agendamentos</h2>
        <p>{appointments.filter(a => a.status !== 'Cancelado').length} atendimentos ativos</p>
      </div>

      <div className="table-container">
        <div className="table-header">
          <div className="tabs" style={{border:'none',marginBottom:0}}>
            <button className={`tab${view==='lista'?' active':''}`} onClick={() => setView('lista')}>Lista</button>
            <button className={`tab${view==='agenda'?' active':''}`} onClick={() => setView('agenda')}>Agenda</button>
          </div>
          <button className="btn btn-primary" onClick={openNew}>+ Novo Agendamento</button>
        </div>

        <div className="search-bar">
          <input className="search-input" placeholder="Buscar cliente ou serviço..." value={search} onChange={e => setSearch(e.target.value)} />
          <select className="search-input" style={{maxWidth:200}} value={filterService} onChange={e => setFilterService(e.target.value)}>
            <option value="">Todos os serviços</option>
            {SERVICES.map(s => <option key={s}>{s}</option>)}
          </select>
          <select className="search-input" style={{maxWidth:150}} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">Todos os status</option>
            {STATUS.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>

        <div className="search-bar" style={{paddingTop:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
